services:
  groundhog:
    build: .
    container_name: groundhog
    ports:
      - "8504:8000"
    networks:
      - caddy-net
    restart: unless-stopped
    volumes:
      - groundhog-srtm:/app/mvp_backend/srtm_cache
      - groundhog-obstacles:/app/mvp_backend/obstacle_data
      - groundhog-airspace:/app/mvp_backend/airspace_data
      - groundhog-faa:/app/faa_nasr
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  caddy-net:
    external: true

volumes:
  groundhog-srtm:
  groundhog-obstacles:
  groundhog-airspace:
  groundhog-faa:
