<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Terrain + Fuel Route Planner (MVP)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; }
    header { padding: 12px 16px; background: #111827; color: #fff; }
    .wrap { display: grid; grid-template-columns: 380px 1fr; gap: 12px; padding: 12px; }
    .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; }
    label { display:block; font-size: 12px; color:#374151; margin-top:10px; }
    input, select { width:100%; padding: 8px; font-size: 14px; border:1px solid #d1d5db; border-radius: 8px; }
    button { width:100%; padding: 10px; border-radius: 10px; border:0; background:#2563eb; color:#fff; font-size: 14px; margin-top: 12px; cursor:pointer; }
    button:disabled { background:#93c5fd; cursor: not-allowed; }
    #abortBtn { background:#dc2626; display:none; position:absolute; top:0; left:0; width:100%; height:100%; margin:0; }
    #abortBtn:hover { background:#b91c1c; }
    .watch-row { display:flex; align-items:center; gap:8px; margin-top:10px; font-size:13px; color:#374151; }
    .watch-row input[type=checkbox] { width:auto; }
    .radio-group { display:flex; gap:12px; margin-top:6px; }
    .radio-group label { display:inline-flex; align-items:center; gap:4px; margin:0; font-size:13px; cursor:pointer; }
    .radio-group input[type=radio] { width:auto; margin:0; }
    #map { height: calc(100vh - 290px); min-height: 300px; border-radius: 10px; }
    #profileWrap { margin-top: 8px; display: none; }
    #profileWrap.visible { display: block; }
    #profileCanvas { width: 100%; height: 180px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fafafa; }
    .profile-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    table { width:100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 6px 4px; text-align:left; }
    .muted { color:#6b7280; font-size: 12px; }
    .err { color:#b91c1c; white-space: pre-wrap; }
    details { margin-top: 10px; }
    @media (max-width: 980px) { .wrap { grid-template-columns: 1fr; } #map { height: 50vh; } }
  </style>
</head>
<body>
  <header>
    <div style="font-weight:600">Terrain + Fuel Route Planner (MVP)</div>
    <div class="muted">S300C defaults prefilled • Fuel stops: public-use only • Fuel type: 100LL/Jet-A • Terrain avoidance via SRTM grid A*</div>
  </header>

  <div class="wrap">
    <div class="card">
      <div style="font-weight:600">Inputs</div>

      <label>Departure ICAO</label>
      <input id="dep" value="KSZT" />

      <label>Arrival ICAO</label>
      <input id="arr" value="E60" />

      <label>Intermediate waypoints (space-sep; all refuel by default, append <code>-NF</code> to skip fuel)</label>
      <input id="waypoints" placeholder="e.g. KBOI N86-NF KSLC" />

      <label>Fuel type required (for stops)</label>
      <select id="fuelType">
        <option value="100LL" selected>100LL</option>
        <option value="JETA">Jet-A</option>
      </select>

      <label>Reserve (minutes)</label>
      <input id="reserveMin" type="number" value="30" min="0" step="1" />

      <label>Cruise speed (kt)</label>
      <input id="speedKt" type="number" value="75" min="1" step="1" />

      <label>Usable fuel (gal)</label>
      <input id="usableFuel" type="number" value="48" min="0" step="0.1" />

      <label>Fuel burn (gph)</label>
      <input id="burnGph" type="number" value="13" min="0" step="0.1" />

      <label>Max altitude (ft MSL)</label>
      <input id="maxMsl" type="number" value="7000" min="0" step="50" />

      <label>Min altitude (ft AGL)</label>
      <input id="minAgl" type="number" value="200" min="0" step="50" />

      <label>Flight mode</label>
      <div class="radio-group">
        <label><input type="radio" name="flightMode" value="maxmsl" checked /> Fly at max MSL</label>
        <label><input type="radio" name="flightMode" value="terrain" /> Terrain following</label>
      </div>

      <div id="terrainFollowOpts">
      <label>Max climb rate (fpm) — 0 = unlimited</label>
      <input id="maxClimb" type="number" value="0" min="0" step="50" placeholder="e.g. 700" />

      <label>Climb speed (kt) — 0 = use cruise</label>
      <input id="climbSpeedKt" type="number" value="0" min="0" step="1" placeholder="e.g. 65" />

      <label>Max descent rate (fpm) — 0 = unlimited</label>
      <input id="maxDescent" type="number" value="0" min="0" step="50" placeholder="e.g. 500" />

      <label>Descent speed (kt) — 0 = use cruise</label>
      <input id="descentSpeedKt" type="number" value="0" min="0" step="1" placeholder="e.g. 90" />
      </div>

      <label>Max detour factor: <span id="detourVal">1.8</span>x</label>
      <input id="detour" type="range" min="1" max="5" value="1.8" step="0.1" />

      <details>
        <summary>Advanced (hidden for MVP)</summary>
        <div class="muted">Grid is fixed at ~1 km; corridor expansion is automatic.</div>
      </details>

      <div style="position:relative; margin-top:12px">
        <button id="goBtn" style="margin:0">Plan route</button>
        <button id="abortBtn">Abort Planning</button>
      </div>

      <label>Saved routes</label>
      <div style="display:flex; gap:6px; align-items:center; margin-top:4px">
        <select id="savedRoutes" style="flex:1; margin:0"><option value="">&mdash; none &mdash;</option></select>
        <button id="saveBtn" type="button" style="background:#16a34a; margin:0; padding:6px 12px; width:auto; font-size:12px; border-radius:6px" title="Save current inputs">Save</button>
        <button id="deleteBtn" type="button" style="background:transparent; border:1px solid #d1d5db; color:#6b7280; margin:0; padding:5px 8px; width:auto; font-size:13px; border-radius:6px; cursor:pointer" title="Delete selected saved route">&times;</button>
      </div>
      <div class="watch-row">
        <input type="checkbox" id="watchSearch" checked />
        <label for="watchSearch" style="margin:0; display:inline">Watch A* search on map</label>
      </div>
      <div id="status" class="muted" style="margin-top:10px"></div>
      <div id="error" class="err" style="margin-top:8px"></div>
      <div id="cacheStats" class="muted" style="margin-top:12px; font-size:0.8em; border-top:1px solid #ddd; padding-top:6px"></div>
    </div>

    <div class="card">
      <div id="map"></div>
      <div id="profileWrap">
        <div class="profile-title">Elevation Profile (side view)</div>
        <canvas id="profileCanvas"></canvas>
      </div>
      <div id="results" style="margin-top:10px"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <script>
    const detour = document.getElementById('detour');
    const detourVal = document.getElementById('detourVal');
    detour.addEventListener('input', () => detourVal.textContent = detour.value);

    const map = L.map('map').setView([39.0, -105.5], 5);

    const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap'
    });

    const usgsTopo = L.tileLayer('https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 16,
      attribution: 'USGS'
    });

    const openTopo = L.tileLayer('https://tile.opentopomap.org/{z}/{x}/{y}.png', {
      maxZoom: 17,
      attribution: '&copy; OpenTopoMap'
    });

    const esriImagery = L.tileLayer('https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryTopo/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 16,
      attribution: 'USGS Imagery'
    });

    const obstacleGroup = L.layerGroup().addTo(map);

    usgsTopo.addTo(map);  // default to USGS Topo

    L.control.layers({
      'USGS Topo': usgsTopo,
      'OpenTopoMap': openTopo,
      'Satellite + Labels': esriImagery,
      'Street Map': osmLayer,
    }, {
      'Obstacles (FAA DOF)': obstacleGroup,
    }, { position: 'topright' }).addTo(map);

    let exploreGroup = L.layerGroup().addTo(map);
    let layerGroup = L.layerGroup().addTo(map);
    let airportGroup = L.layerGroup().addTo(map);
    let abortController = null;
    let airportsLoaded = false;
    let airportLookup = {};  // ICAO → {elev, name, ...}

    // ── Obstacle layer: load on map move when zoomed in ──
    let _obsFetchController = null;
    const OBS_MIN_ZOOM = 8;

    function obstacleIcon(agl, lit) {
      const h = Math.min(agl, 2000);
      // Red intensity by height: taller = more opaque/red
      const t = Math.min(h / 1000, 1);
      const r = Math.round(180 + 75 * t);
      const color = lit ? `rgb(${r},0,0)` : `rgb(${r},80,0)`;
      const size = Math.max(5, Math.min(10, 4 + h / 300));
      return { color, size };
    }

    async function loadObstacles() {
      const z = map.getZoom();
      obstacleGroup.clearLayers();
      if (z < OBS_MIN_ZOOM) return;

      const b = map.getBounds();
      const params = new URLSearchParams({
        south: b.getSouth().toFixed(4),
        north: b.getNorth().toFixed(4),
        west: b.getWest().toFixed(4),
        east: b.getEast().toFixed(4),
        min_agl: '200',
      });

      if (_obsFetchController) _obsFetchController.abort();
      _obsFetchController = new AbortController();

      try {
        const resp = await fetch('/obstacles?' + params, { signal: _obsFetchController.signal });
        const data = await resp.json();
        for (const o of data) {
          const { color, size } = obstacleIcon(o.agl, o.lit);
          L.circleMarker([o.lat, o.lon], {
            radius: size, color, fillColor: color,
            fillOpacity: 0.7, weight: 1, opacity: 0.9,
          }).bindPopup(
            `<b>${o.type}</b><br>${o.agl}' AGL / ${o.amsl}' MSL${o.lit ? '<br>Lighted' : ''}`
          ).addTo(obstacleGroup);
        }
      } catch (e) {
        if (e.name !== 'AbortError') console.warn('Obstacle load error:', e);
      }
    }

    map.on('moveend', loadObstacles);
    map.on('zoomend', loadObstacles);

    function apLabel(icao) {
      const ap = airportLookup[icao];
      return ap ? `${icao} (${Math.round(ap.elev)}')` : icao;
    }

    function clearMap() {
      layerGroup.clearLayers();
      exploreGroup.clearLayers();
      document.getElementById('profileWrap').classList.remove('visible');
    }

    async function loadAirports() {
      if (airportsLoaded) return;
      try {
        const res = await fetch('/airports');
        if (!res.ok) return;
        const list = await res.json();
        airportsLoaded = true;
        for (const ap of list) {
          airportLookup[ap.icao] = ap;
          const hasFuel = ap.fuel_100ll || ap.fuel_jeta;
          const color = hasFuel ? '#16a34a' : '#6b7280';
          const fuelStr = [ap.fuel_100ll ? '100LL' : '', ap.fuel_jeta ? 'Jet-A' : ''].filter(Boolean).join(', ') || 'None';
          L.circleMarker([ap.lat, ap.lon], {
            radius: 4, color, fillColor: color,
            fillOpacity: 0.7, weight: 1, opacity: 0.8,
          }).bindTooltip(`<b>${ap.icao}</b><br>${ap.name}<br>Elev: ${Math.round(ap.elev)} ft<br>Fuel: ${fuelStr}`, {
            direction: 'top', offset: [0, -6],
          }).addTo(airportGroup);
        }
      } catch (e) { /* silent */ }
    }

    // Load airports on startup
    loadAirports();

    // Toggle terrain-follow options visibility
    const terrainOpts = document.getElementById('terrainFollowOpts');
    document.querySelectorAll('input[name="flightMode"]').forEach(radio => {
      radio.addEventListener('change', () => {
        terrainOpts.style.display = radio.value === 'terrain' && radio.checked ? '' : 'none';
      });
    });
    terrainOpts.style.display = 'none'; // hidden by default (Max MSL mode)

    async function fetchAndDrawProfile(path, maxMsl, minAgl, depLabel, arrLabel, cruiseKt, maxClimbFpm, maxDescentFpm, climbSpeedKt, descentSpeedKt, terrainFollow) {
      try {
        const res = await fetch('/elevation-profile', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify({ path, max_msl_ft: maxMsl, min_agl_ft: minAgl }),
        });
        if (!res.ok) return;
        const data = await res.json();
        drawProfile(data, depLabel, arrLabel, cruiseKt, maxClimbFpm, maxDescentFpm, climbSpeedKt, descentSpeedKt, terrainFollow);
      } catch (e) { /* silent */ }
    }

    function drawProfile(data, depLabel, arrLabel, cruiseKt, maxClimbFpm, maxDescentFpm, climbSpeedKt, descentSpeedKt, terrainFollow) {
      const wrap = document.getElementById('profileWrap');
      const canvas = document.getElementById('profileCanvas');
      wrap.classList.add('visible');

      // Hi-DPI support
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      const W = rect.width, H = rect.height;

      const pad = { top: 20, right: 20, bottom: 30, left: 55 };
      const pw = W - pad.left - pad.right;
      const ph = H - pad.top - pad.bottom;

      const dist = data.dist_nm;
      const ground = data.ground_ft;
      const maxMsl = data.max_msl_ft;
      const minAgl = data.min_agl_ft;

      const maxDist = dist[dist.length - 1] || 1;
      const maxElev = Math.max(maxMsl, ...ground) * 1.1;

      function x(d) { return pad.left + (d / maxDist) * pw; }
      function y(e) { return pad.top + ph - (e / maxElev) * ph; }

      ctx.clearRect(0, 0, W, H);

      // Grid lines
      ctx.strokeStyle = '#e5e7eb';
      ctx.lineWidth = 0.5;
      const elevTicks = 5;
      for (let i = 0; i <= elevTicks; i++) {
        const ev = (maxElev / elevTicks) * i;
        ctx.beginPath(); ctx.moveTo(pad.left, y(ev)); ctx.lineTo(W - pad.right, y(ev)); ctx.stroke();
        ctx.fillStyle = '#6b7280'; ctx.font = '10px system-ui';
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillText(Math.round(ev).toLocaleString() + ' ft', pad.left - 4, y(ev));
      }

      // Distance labels
      const distTicks = 5;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      for (let i = 0; i <= distTicks; i++) {
        const d = (maxDist / distTicks) * i;
        const xp = x(d);
        ctx.beginPath(); ctx.moveTo(xp, pad.top); ctx.lineTo(xp, H - pad.bottom); ctx.stroke();
        ctx.fillStyle = '#6b7280'; ctx.font = '10px system-ui';
        ctx.fillText(Math.round(d) + ' NM', xp, H - pad.bottom + 4);
      }

      // Max MSL ceiling line
      ctx.strokeStyle = '#dc2626';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.moveTo(pad.left, y(maxMsl)); ctx.lineTo(W - pad.right, y(maxMsl)); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#dc2626'; ctx.font = '10px system-ui'; ctx.textAlign = 'left';
      ctx.fillText('Max MSL ' + maxMsl.toLocaleString() + ' ft', pad.left + 4, y(maxMsl) - 12);

      // Min AGL band (terrain + minAgl)
      ctx.fillStyle = 'rgba(239, 68, 68, 0.08)';
      ctx.beginPath();
      ctx.moveTo(x(dist[0]), y(ground[0] + minAgl));
      for (let i = 1; i < dist.length; i++) ctx.lineTo(x(dist[i]), y(ground[i] + minAgl));
      for (let i = dist.length - 1; i >= 0; i--) ctx.lineTo(x(dist[i]), y(ground[i]));
      ctx.closePath(); ctx.fill();

      // Terrain fill
      ctx.fillStyle = 'rgba(180, 140, 100, 0.35)';
      ctx.beginPath();
      ctx.moveTo(x(dist[0]), y(0));
      for (let i = 0; i < dist.length; i++) ctx.lineTo(x(dist[i]), y(ground[i]));
      ctx.lineTo(x(dist[dist.length-1]), y(0));
      ctx.closePath(); ctx.fill();

      // Terrain line
      ctx.strokeStyle = '#92400e';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x(dist[0]), y(ground[0]));
      for (let i = 1; i < dist.length; i++) ctx.lineTo(x(dist[i]), y(ground[i]));
      ctx.stroke();

      // Min AGL line above terrain
      ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(x(dist[0]), y(ground[0] + minAgl));
      for (let i = 1; i < dist.length; i++) ctx.lineTo(x(dist[i]), y(ground[i] + minAgl));
      ctx.stroke();
      ctx.setLineDash([]);

      // Dep / Arr labels
      ctx.fillStyle = '#111827'; ctx.font = 'bold 11px system-ui';
      ctx.textAlign = 'left';
      ctx.fillText(depLabel, x(0) + 2, pad.top + 4);
      ctx.textAlign = 'right';
      ctx.fillText(arrLabel, x(maxDist) - 2, pad.top + 4);

      // Flight altitude trace
      if (terrainFollow && cruiseKt > 0 && (maxClimbFpm > 0 || maxDescentFpm > 0)) {
        // Terrain following: hug min AGL, limited by ROC/ROD
        const climbKt = climbSpeedKt > 0 ? climbSpeedKt : cruiseKt;
        const descentKt = descentSpeedKt > 0 ? descentSpeedKt : cruiseKt;
        const fa = [Math.min(Math.max(ground[0] + minAgl, ground[0]), maxMsl)];
        for (let i = 1; i < dist.length; i++) {
          const segDist = dist[i] - dist[i - 1];
          const prev = fa[i - 1];
          const required = ground[i] + minAgl;
          const dtClimb = (segDist / climbKt) * 60;
          const dtDescent = (segDist / descentKt) * 60;
          const ceiling = maxClimbFpm > 0 ? Math.min(prev + maxClimbFpm * dtClimb, maxMsl) : maxMsl;
          const floor = maxDescentFpm > 0 ? Math.max(prev - maxDescentFpm * dtDescent, required) : required;
          fa.push(Math.min(ceiling, Math.max(required, floor)));
        }
        ctx.strokeStyle = '#2563eb';
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(x(dist[0]), y(fa[0]));
        for (let i = 1; i < fa.length; i++) ctx.lineTo(x(dist[i]), y(fa[i]));
        ctx.stroke();
        ctx.fillStyle = '#2563eb'; ctx.font = '10px system-ui'; ctx.textAlign = 'left';
        ctx.fillText('Terrain-follow alt (est.)', pad.left + 4, y(fa[Math.min(5, fa.length - 1)]) - 8);
      } else {
        // Max MSL mode: flat cruise line at max MSL
        ctx.strokeStyle = '#2563eb';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 3]);
        ctx.beginPath();
        ctx.moveTo(pad.left, y(maxMsl));
        ctx.lineTo(W - pad.right, y(maxMsl));
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    function addPath(path, color) {
      const poly = L.polyline(path, {color, weight: 4, opacity: 0.85});
      poly.addTo(layerGroup);
      return poly;
    }

    function addMarker(lat, lon, label) {
      return L.marker([lat, lon]).bindPopup(apLabel(label)).addTo(layerGroup);
    }

    function fmt(n, digits=2) {
      if (n === null || n === undefined) return '';
      return Number(n).toFixed(digits);
    }

    function haversineNm(lat1, lon1, lat2, lon2) {
      const R = 3440.065;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function renderNavLog({legs, usableFuelGal, reserveMin, burnGph, depLabel, arrLabel, stops, failedLeg}) {
      const reserveGal = (reserveMin / 60) * burnGph;
      const resultsDiv = document.getElementById('results');
      const route = apLabel(depLabel) + (stops && stops.length ? ' → ' + stops.map(s => apLabel(s)).join(' → ') : '') + ' → ' + apLabel(arrLabel);

      let html = `<div style="font-weight:600; margin-top:10px">Navigation Log</div>`;
      html += `<div style="margin:4px 0; font-size:0.9em">${route}</div>`;
      html += '<table style="font-size:0.85em; border-collapse:collapse; width:100%">';
      html += '<thead><tr style="border-bottom:2px solid #888">';
      html += '<th style="text-align:left;padding:2px 6px">#</th>';
      html += '<th style="text-align:left;padding:2px 6px">From</th>';
      html += '<th style="text-align:left;padding:2px 6px">To</th>';
      html += '<th style="text-align:right;padding:2px 6px">Dist<br>NM</th>';
      html += '<th style="text-align:right;padding:2px 6px">Time</th>';
      html += '<th style="text-align:right;padding:2px 6px">Fuel<br>Burn</th>';
      html += '<th style="text-align:right;padding:2px 6px">Fuel<br>Rem</th>';
      html += '<th style="text-align:right;padding:2px 6px;border-left:2px solid #888">Trip<br>Dist</th>';
      html += '<th style="text-align:right;padding:2px 6px">Trip<br>Time</th>';
      html += '<th style="text-align:right;padding:2px 6px">Trip<br>Fuel</th>';
      html += '</tr></thead><tbody>';

      let tripDist = 0, tripTime = 0, tripFuel = 0;
      legs.forEach((leg, i) => {
        tripDist += leg.distNm;
        tripTime += leg.timeHr;
        tripFuel += leg.fuelGal;
        const fuelRem = usableFuelGal - leg.fuelGal;
        const legMin = Math.round(leg.timeHr * 60);
        const tripMin = Math.round(tripTime * 60);

        html += '<tr style="border-bottom:1px solid #ddd">';
        html += `<td style="padding:2px 6px">${i + 1}${leg.cached ? ' \u26A1' : ''}</td>`;
        html += `<td style="padding:2px 6px">${apLabel(leg.from)}</td>`;
        html += `<td style="padding:2px 6px">${apLabel(leg.to)}</td>`;
        html += `<td style="text-align:right;padding:2px 6px">${fmt(leg.distNm, 1)}</td>`;
        html += `<td style="text-align:right;padding:2px 6px">${legMin} min</td>`;
        html += `<td style="text-align:right;padding:2px 6px">${fmt(leg.fuelGal, 1)} gal</td>`;
        html += `<td style="text-align:right;padding:2px 6px;color:${fuelRem < reserveGal ? '#dc2626' : '#16a34a'}">${fmt(fuelRem, 1)} gal</td>`;
        html += `<td style="text-align:right;padding:2px 6px;border-left:2px solid #888">${fmt(tripDist, 1)}</td>`;
        html += `<td style="text-align:right;padding:2px 6px">${tripMin} min</td>`;
        html += `<td style="text-align:right;padding:2px 6px">${fmt(tripFuel, 1)} gal</td>`;
        html += '</tr>';
      });

      // failed leg row (if route aborted mid-way)
      if (failedLeg) {
        html += '<tr style="border-bottom:1px solid #ddd; background:#fef2f2; color:#dc2626">';
        html += `<td style="padding:2px 6px">${legs.length + 1} \u2716</td>`;
        html += `<td style="padding:2px 6px">${failedLeg.from ? apLabel(failedLeg.from) : '?'}</td>`;
        html += `<td style="padding:2px 6px">${failedLeg.to ? apLabel(failedLeg.to) : '?'}</td>`;
        html += '<td colspan="4" style="padding:2px 6px">NO PATH FOUND</td>';
        html += '<td colspan="3" style="border-left:2px solid #888"></td>';
        html += '</tr>';
      }

      // totals row
      const lastFuelRem = legs.length ? usableFuelGal - legs[legs.length - 1].fuelGal : usableFuelGal;
      html += '<tr style="border-top:2px solid #888; font-weight:600">';
      html += `<td colspan="3" style="padding:2px 6px">Total</td>`;
      html += `<td style="text-align:right;padding:2px 6px">${fmt(tripDist, 1)}</td>`;
      html += `<td style="text-align:right;padding:2px 6px">${Math.round(tripTime * 60)} min</td>`;
      html += `<td style="text-align:right;padding:2px 6px">${fmt(tripFuel, 1)} gal</td>`;
      html += `<td style="text-align:right;padding:2px 6px;color:${lastFuelRem < reserveGal ? '#dc2626' : '#16a34a'}">${fmt(lastFuelRem, 1)} gal</td>`;
      html += '<td colspan="3" style="border-left:2px solid #888"></td>';
      html += '</tr>';

      // reserve row
      html += '<tr style="font-size:0.9em; color:#666">';
      html += `<td colspan="5" style="padding:2px 6px">Reserve (${fmt(reserveMin, 0)} min)</td>`;
      html += `<td colspan="2" style="text-align:right;padding:2px 6px">${fmt(reserveGal, 1)} gal</td>`;
      html += '<td colspan="3" style="border-left:2px solid #888"></td>';
      html += '</tr>';

      html += '</tbody></table>';
      resultsDiv.innerHTML = html;
    }

    function setPlanning(active) {
      document.getElementById('goBtn').disabled = active;
      document.getElementById('abortBtn').style.display = active ? 'block' : 'none';
    }

    function abortPlanning() {
      if (abortController) {
        abortController.abort();
        abortController = null;
      }
      setPlanning(false);
      document.getElementById('status').textContent = 'Aborted.';
    }

    document.getElementById('abortBtn').addEventListener('click', abortPlanning);

    function getPayload() {
      return {
        dep_icao: document.getElementById('dep').value.trim().toUpperCase(),
        arr_icao: document.getElementById('arr').value.trim().toUpperCase(),
        cruise_speed_kt: Number(document.getElementById('speedKt').value),
        usable_fuel_gal: Number(document.getElementById('usableFuel').value),
        fuel_burn_gph: Number(document.getElementById('burnGph').value),
        reserve_min: Number(document.getElementById('reserveMin').value),
        min_agl_ft: Number(document.getElementById('minAgl').value),
        max_msl_ft: Number(document.getElementById('maxMsl').value),
        required_fuel: document.getElementById('fuelType').value,
        max_detour_factor: Number(document.getElementById('detour').value),
        max_climb_fpm: Number(document.getElementById('maxClimb').value) || 0,
        max_descent_fpm: Number(document.getElementById('maxDescent').value) || 0,
        climb_speed_kt: Number(document.getElementById('climbSpeedKt').value) || 0,
        descent_speed_kt: Number(document.getElementById('descentSpeedKt').value) || 0,
        terrain_follow: document.querySelector('input[name="flightMode"]:checked').value === 'terrain',
        waypoints: document.getElementById('waypoints').value.split(/[\s,]+/).map(s => s.trim().toUpperCase()).filter(Boolean),  // may contain -NF suffix
      };
    }

    async function planStreaming(payload) {
      abortController = new AbortController();
      setPlanning(true);
      document.getElementById('status').textContent = 'Planning route (checking fuel)...';
      clearMap();

      let exploredCount = 0;
      const legColors = ['#2563eb', '#16a34a', '#dc2626', '#9333ea', '#ea580c'];
      let totalDistNm = 0, totalTimeHr = 0, totalFuelGal = 0;
      let lastLegFuelGal = 0;
      let allCoords = [];
      let legsList = [];
      let legLayers = [];  // per-leg [polyline, marker1, marker2] for selective removal
      let stops = [];
      let currentLeg = 0;
      let numLegs = 1;
      let overallBounds = null;

      try {
        const res = await fetch('/route/stream', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify(payload),
          signal: abortController.signal,
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => null);
          throw new Error(errData?.detail || `HTTP ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, {stream: true});

          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const event = JSON.parse(line.slice(6));

            if (event.type === 'reroute') {
              // Terrain blocked a leg — server is replanning this segment
              const keep = event.keep_legs || 0;
              exploreGroup.clearLayers();
              // Remove only the current segment's map layers
              for (let k = keep; k < legLayers.length; k++) {
                for (const lyr of legLayers[k]) layerGroup.removeLayer(lyr);
              }
              legLayers = legLayers.slice(0, keep);
              // Rollback stats to the kept legs
              legsList = legsList.slice(0, keep);
              allCoords = [];
              totalDistNm = 0; totalTimeHr = 0; totalFuelGal = 0;
              for (const leg of legsList) {
                totalDistNm += leg.distNm;
                totalTimeHr += leg.timeHr;
                totalFuelGal += leg.fuelGal;
                allCoords = allCoords.concat(leg._coords || []);
              }
              exploredCount = 0;
              currentLeg = keep;
              document.getElementById('status').textContent = event.message || 'Replanning segment\u2026';
            }

            if (event.type === 'route_plan') {
              stops = event.stops || [];
              numLegs = event.num_legs || 1;
              document.getElementById('status').textContent =
                numLegs > 1
                  ? `Route requires ${numLegs} legs (${stops.length} fuel stop${stops.length !== 1 ? 's' : ''}). Streaming leg 1...`
                  : 'Downloading elevation tiles & searching...';
            }

            if (event.type === 'leg_start') {
              currentLeg = event.leg_index || 0;
              if (numLegs > 1) {
                document.getElementById('status').textContent =
                  `Streaming leg ${currentLeg + 1} of ${numLegs}: ${event.from} → ${event.to}...`;
              }
            }

            if (event.type === 'grid') {
              const b = event.bounds;
              const legBounds = L.latLngBounds([[b[0], b[1]], [b[2], b[3]]]);
              overallBounds = overallBounds ? overallBounds.extend(legBounds) : legBounds;
              map.fitBounds(legBounds, {padding: [30, 30]});
            }

            if (event.type === 'explore') {
              exploredCount += event.cells.length;
              document.getElementById('status').textContent =
                numLegs > 1
                  ? `Leg ${currentLeg + 1}/${numLegs} — ${exploredCount.toLocaleString()} cells explored`
                  : `Searching... ${exploredCount.toLocaleString()} cells explored`;
              for (const [lat, lon] of event.cells) {
                L.circleMarker([lat, lon], {
                  radius: 1, color: '#f59e0b', fillColor: '#f59e0b',
                  fillOpacity: 0.15, weight: 0, opacity: 0.15
                }).addTo(exploreGroup);
              }
            }

            if (event.type === 'path') {
              exploreGroup.clearLayers();

              const color = legColors[currentLeg % legColors.length];
              const poly = addPath(event.coords, color);

              // Track per-leg map layers for selective removal on reroute
              const m1 = event.coords.length ? addMarker(event.coords[0][0], event.coords[0][1], event.from || payload.dep_icao) : null;
              const m2 = event.coords.length ? addMarker(
                event.coords[event.coords.length-1][0],
                event.coords[event.coords.length-1][1],
                event.to || payload.arr_icao
              ) : null;
              legLayers.push([poly, m1, m2].filter(Boolean));

              // accumulate
              totalDistNm += event.dist_nm;
              const legTimeHr = event.dist_nm / payload.cruise_speed_kt;
              const legFuelGal = legTimeHr * payload.fuel_burn_gph;
              totalTimeHr += legTimeHr;
              totalFuelGal += legFuelGal;
              lastLegFuelGal = legFuelGal;
              allCoords = allCoords.concat(event.coords);
              legsList.push({
                from: event.from || payload.dep_icao,
                to: event.to || payload.arr_icao,
                distNm: event.dist_nm,
                timeHr: legTimeHr,
                fuelGal: legFuelGal,
                cached: !!event.cached,
                _coords: event.coords,  // stash for reroute recovery
              });

              // fit to overall bounds
              if (overallBounds) {
                overallBounds.extend(poly.getBounds());
                map.fitBounds(overallBounds.pad(0.15));
              } else {
                map.fitBounds(poly.getBounds().pad(0.15));
              }
            }

            if (event.type === 'no_path') {
              // render partial nav log with completed legs + failed leg
              if (legsList.length > 0) {
                renderNavLog({
                  legs: legsList,
                  usableFuelGal: payload.usable_fuel_gal,
                  reserveMin: payload.reserve_min,
                  burnGph: payload.fuel_burn_gph,
                  depLabel: payload.dep_icao,
                  arrLabel: payload.arr_icao,
                  stops,
                  failedLeg: { from: event.from, to: event.to },
                });
                if (allCoords.length >= 2) {
                  fetchAndDrawProfile(allCoords, payload.max_msl_ft, payload.min_agl_ft, payload.dep_icao, payload.arr_icao,
                    payload.cruise_speed_kt, payload.max_climb_fpm, payload.max_descent_fpm,
                    payload.climb_speed_kt, payload.descent_speed_kt, payload.terrain_follow);
                }
              }
              document.getElementById('status').textContent = '';
              document.getElementById('error').textContent =
                event.message || 'No terrain-avoiding path found.';
            }

            if (event.type === 'done') {
              if (legsList.length > 0) {
                renderNavLog({
                  legs: legsList,
                  usableFuelGal: payload.usable_fuel_gal,
                  reserveMin: payload.reserve_min,
                  burnGph: payload.fuel_burn_gph,
                  depLabel: payload.dep_icao,
                  arrLabel: payload.arr_icao,
                  stops,
                });

                const cachedCount = legsList.filter(l => l.cached).length;
                let statusMsg = `Route found! ${fmt(totalDistNm, 1)} NM`;
                if (cachedCount === legsList.length) {
                  statusMsg += ' (all legs from cache \u26A1)';
                } else if (cachedCount > 0) {
                  statusMsg += ` (${cachedCount}/${legsList.length} legs cached \u26A1, ${exploredCount.toLocaleString()} cells explored)`;
                } else {
                  statusMsg += `, ${exploredCount.toLocaleString()} cells explored`;
                }
                if (stops.length) statusMsg += ` | ${stops.length} fuel stop${stops.length !== 1 ? 's' : ''}`;
                document.getElementById('status').textContent = statusMsg;

                fetchAndDrawProfile(allCoords, payload.max_msl_ft, payload.min_agl_ft, payload.dep_icao, payload.arr_icao,
                  payload.cruise_speed_kt, payload.max_climb_fpm, payload.max_descent_fpm,
                  payload.climb_speed_kt, payload.descent_speed_kt, payload.terrain_follow);
              } else {
                if (!document.getElementById('error').textContent)
                  document.getElementById('status').textContent = 'Done.';
              }
            }
          }
        }
      } catch (e) {
        if (e.name === 'AbortError') return;
        document.getElementById('status').textContent = '';
        document.getElementById('error').textContent = String(e);
      } finally {
        abortController = null;
        setPlanning(false);
        refreshCacheStats();
      }
    }

    async function planNormal(payload) {
      setPlanning(true);
      abortController = new AbortController();
      document.getElementById('status').textContent = 'Planning... (first run may download SRTM tiles)';
      clearMap();

      try {
        const res = await fetch('/route', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify(payload),
          signal: abortController.signal,
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error((data && data.detail) ? data.detail : ('HTTP ' + res.status));
        }

        if (data.type === 'no_route') {
          document.getElementById('status').textContent = '';
          document.getElementById('error').textContent = data.message + "\n\nSuggestions:\n- " + (data.suggestions || []).join('\n- ');
          return;
        }

        // render nav log
        const navLegs = data.legs.map(l => ({
          from: l.from, to: l.to, distNm: l.dist_nm, timeHr: l.time_hr, fuelGal: l.fuel_gal
        }));

        renderNavLog({
          legs: navLegs,
          usableFuelGal: payload.usable_fuel_gal,
          reserveMin: payload.reserve_min,
          burnGph: payload.fuel_burn_gph,
          depLabel: payload.dep_icao,
          arrLabel: payload.arr_icao,
          stops: data.stops || [],
        });

        document.getElementById('status').textContent = '';

        // map
        const colors = ['#2563eb', '#16a34a'];
        let bounds = null;
        data.legs.forEach((leg, idx) => {
          const path = (leg.path || []).map(p => [p[0], p[1]]);
          if (path.length) {
            const poly = addPath(path, colors[idx % colors.length]);
            if (!bounds) bounds = poly.getBounds(); else bounds.extend(poly.getBounds());
          }
        });

        if (data.legs && data.legs.length) {
          const firstPath = data.legs[0].path || [];
          const lastPath = data.legs[data.legs.length - 1].path || [];
          if (firstPath.length) addMarker(firstPath[0][0], firstPath[0][1], payload.dep_icao);
          if (lastPath.length) addMarker(lastPath[lastPath.length-1][0], lastPath[lastPath.length-1][1], payload.arr_icao);
        }

        if (bounds) map.fitBounds(bounds.pad(0.15));

        // Fetch and draw elevation profile for all legs combined
        const allCoords = data.legs.flatMap(l => l.path || []);
        if (allCoords.length >= 2) {
          fetchAndDrawProfile(allCoords, payload.max_msl_ft, payload.min_agl_ft, payload.dep_icao, payload.arr_icao,
            payload.cruise_speed_kt, payload.max_climb_fpm, payload.max_descent_fpm,
            payload.climb_speed_kt, payload.descent_speed_kt, payload.terrain_follow);
        }

      } catch (e) {
        if (e.name === 'AbortError') return;
        document.getElementById('status').textContent = '';
        document.getElementById('error').textContent = String(e);
      } finally {
        abortController = null;
        setPlanning(false);
        refreshCacheStats();
      }
    }

    async function plan() {
      document.getElementById('error').textContent = '';
      document.getElementById('results').innerHTML = '';
      const payload = getPayload();

      // Pre-flight check: airport elevation vs max MSL ceiling
      const depAp = airportLookup[payload.dep_icao];
      const arrAp = airportLookup[payload.arr_icao];
      if (depAp && depAp.elev > payload.max_msl_ft) {
        document.getElementById('error').textContent =
          `${payload.dep_icao} elevation (${Math.round(depAp.elev)}' MSL) is above your max altitude ceiling (${payload.max_msl_ft}' MSL). Increase Max MSL or pick a different airport.`;
        return;
      }
      if (arrAp && arrAp.elev > payload.max_msl_ft) {
        document.getElementById('error').textContent =
          `${payload.arr_icao} elevation (${Math.round(arrAp.elev)}' MSL) is above your max altitude ceiling (${payload.max_msl_ft}' MSL). Increase Max MSL or pick a different airport.`;
        return;
      }

      // Check waypoint elevations too (strip -NF suffix for lookup)
      for (const wpRaw of payload.waypoints) {
        const wpCode = wpRaw.replace(/-NF$/i, '');
        const wpAp = airportLookup[wpCode];
        if (wpAp && wpAp.elev > payload.max_msl_ft) {
          document.getElementById('error').textContent =
            `Waypoint ${wpCode} elevation (${Math.round(wpAp.elev)}' MSL) is above your max altitude ceiling (${payload.max_msl_ft}' MSL). Increase Max MSL or remove this waypoint.`;
          return;
        }
      }

      const watch = document.getElementById('watchSearch').checked;
      if (watch) {
        await planStreaming(payload);
      } else {
        await planNormal(payload);
      }
    }

    document.getElementById('goBtn').addEventListener('click', plan);

    // cache stats
    async function refreshCacheStats() {
      try {
        const r = await fetch('/cache/stats');
        if (!r.ok) return;
        const s = await r.json();
        document.getElementById('cacheStats').innerHTML =
          `Route cache: ${s.cached_legs} legs cached, ${s.total_hits} hits | ${s.routes_logged} routes logged`;
      } catch {}
    }
    refreshCacheStats();

    // ── Save / Load routes (localStorage) ──
    const STORAGE_KEY = 'groundhog_saved_routes';

    function getSavedRoutes() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function refreshSavedDropdown() {
      const sel = document.getElementById('savedRoutes');
      const routes = getSavedRoutes();
      sel.innerHTML = '<option value="">\u2014 none \u2014</option>';
      for (const name of Object.keys(routes).sort()) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      }
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      const payload = getPayload();
      const wpDisplay = payload.waypoints.map(w => {
        const nf = w.endsWith('-NF');
        const code = nf ? w.slice(0, -3) : w;
        return nf ? code : code + ' \u26FD';
      });
      const defaultName = payload.dep_icao +
        (wpDisplay.length ? ' \u2192 ' + wpDisplay.join(' \u2192 ') : '') +
        ' \u2192 ' + payload.arr_icao;
      const name = prompt('Route name:', defaultName);
      if (!name) return;
      const routes = getSavedRoutes();
      routes[name] = {
        dep: payload.dep_icao,
        arr: payload.arr_icao,
        waypoints: document.getElementById('waypoints').value,
        cruise_speed_kt: payload.cruise_speed_kt,
        usable_fuel_gal: payload.usable_fuel_gal,
        fuel_burn_gph: payload.fuel_burn_gph,
        reserve_min: payload.reserve_min,
        max_msl_ft: payload.max_msl_ft,
        min_agl_ft: payload.min_agl_ft,
        required_fuel: payload.required_fuel,
        max_detour_factor: payload.max_detour_factor,
        max_climb_fpm: payload.max_climb_fpm,
        max_descent_fpm: payload.max_descent_fpm,
        climb_speed_kt: payload.climb_speed_kt,
        descent_speed_kt: payload.descent_speed_kt,
        terrain_follow: payload.terrain_follow,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(routes));
      refreshSavedDropdown();
      document.getElementById('savedRoutes').value = name;
    });

    document.getElementById('deleteBtn').addEventListener('click', () => {
      const sel = document.getElementById('savedRoutes');
      const name = sel.value;
      if (!name) return;
      if (!confirm(`Delete saved route "${name}"?`)) return;
      const routes = getSavedRoutes();
      delete routes[name];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(routes));
      refreshSavedDropdown();
    });

    document.getElementById('savedRoutes').addEventListener('change', (e) => {
      const name = e.target.value;
      if (!name) return;
      const routes = getSavedRoutes();
      const r = routes[name];
      if (!r) return;
      document.getElementById('dep').value = r.dep || '';
      document.getElementById('arr').value = r.arr || '';
      document.getElementById('waypoints').value = r.waypoints || '';
      document.getElementById('speedKt').value = r.cruise_speed_kt || 75;
      document.getElementById('usableFuel').value = r.usable_fuel_gal || 48;
      document.getElementById('burnGph').value = r.fuel_burn_gph || 13;
      document.getElementById('reserveMin').value = r.reserve_min || 30;
      document.getElementById('maxMsl').value = r.max_msl_ft || 7000;
      document.getElementById('minAgl').value = r.min_agl_ft || 200;
      document.getElementById('fuelType').value = r.required_fuel || '100LL';
      document.getElementById('detour').value = r.max_detour_factor || 1.8;
      detourVal.textContent = r.max_detour_factor || 1.8;
      document.getElementById('maxClimb').value = r.max_climb_fpm || 0;
      document.getElementById('maxDescent').value = r.max_descent_fpm || 0;
      document.getElementById('climbSpeedKt').value = r.climb_speed_kt || 0;
      document.getElementById('descentSpeedKt').value = r.descent_speed_kt || 0;
      // Set flight mode radio
      const modeVal = r.terrain_follow ? 'terrain' : 'maxmsl';
      document.querySelector(`input[name="flightMode"][value="${modeVal}"]`).checked = true;
      document.querySelector('input[name="flightMode"]').dispatchEvent(new Event('change'));
    });

    refreshSavedDropdown();
  </script>
</body>
</html>
