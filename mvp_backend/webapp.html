<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Terrain + Fuel Route Planner (MVP)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; }
    header { padding: 12px 16px; background: #111827; color: #fff; }
    .wrap { display: grid; grid-template-columns: 380px 1fr; gap: 12px; padding: 12px; }
    .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; }
    label { display:block; font-size: 12px; color:#374151; margin-top:10px; }
    input, select { width:100%; padding: 8px; font-size: 14px; border:1px solid #d1d5db; border-radius: 8px; }
    button { width:100%; padding: 10px; border-radius: 10px; border:0; background:#2563eb; color:#fff; font-size: 14px; margin-top: 12px; cursor:pointer; }
    button:disabled { background:#93c5fd; cursor: not-allowed; }
    #abortBtn { background:#dc2626; display:none; position:absolute; top:0; left:0; width:100%; height:100%; margin:0; }
    #abortBtn:hover { background:#b91c1c; }
    .watch-row { display:flex; align-items:center; gap:8px; margin-top:10px; font-size:13px; color:#374151; }
    .watch-row input[type=checkbox] { width:auto; }
    .radio-group { display:flex; gap:12px; margin-top:6px; }
    .radio-group label { display:inline-flex; align-items:center; gap:4px; margin:0; font-size:13px; cursor:pointer; }
    .radio-group input[type=radio] { width:auto; margin:0; }
    #map { height: calc(100vh - 290px); min-height: 300px; border-radius: 10px; }
    #profileWrap { margin-top: 8px; display: none; }
    #profileWrap.visible { display: block; }
    #profileCanvas { width: 100%; height: 250px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fafafa; cursor: grab; }
    #profileCanvas:active { cursor: grabbing; }
    .profile-controls { display: inline-flex; gap: 6px; margin-left: 12px; }
    .profile-controls button { font-size: 11px; padding: 1px 8px; border: 1px solid #d1d5db; border-radius: 4px; background: #fff; cursor: pointer; }
    .profile-controls button:hover { background: #f3f4f6; }
    .profile-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    table { width:100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 6px 4px; text-align:left; }
    .muted { color:#6b7280; font-size: 12px; }
    .err { color:#b91c1c; white-space: pre-wrap; }
    details { margin-top: 10px; }
    @media (max-width: 980px) { .wrap { grid-template-columns: 1fr; } #map { height: 50vh; } }
    /* Leaflet layer control styling */
    .leaflet-control-layers {
      border-radius: 10px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18) !important;
      border: 1px solid #e5e7eb !important;
      padding: 0 !important;
      overflow: hidden;
    }
    .leaflet-control-layers-toggle {
      width: 36px !important; height: 36px !important;
      background-size: 20px 20px !important;
    }
    .leaflet-control-layers-expanded {
      padding: 10px 14px 10px 10px !important;
      min-width: 200px;
    }
    .leaflet-control-layers-list {
      font-family: system-ui, -apple-system, sans-serif !important;
      font-size: 13px !important;
    }
    .leaflet-control-layers-separator {
      border-top: 1px solid #e5e7eb !important;
      margin: 6px 0 !important;
    }
    .leaflet-control-layers label {
      display: flex !important; align-items: center; gap: 6px;
      margin: 3px 0 !important; padding: 3px 4px; border-radius: 5px;
      cursor: pointer; font-size: 13px !important; color: #1f2937;
      transition: background 0.15s;
    }
    .leaflet-control-layers label:hover { background: #f3f4f6; }
    .leaflet-control-layers input[type="radio"],
    .leaflet-control-layers input[type="checkbox"] {
      margin: 0 !important; width: auto !important;
      accent-color: #2563eb;
    }
    .leaflet-control-layers-base label { font-weight: 500; }
    .leaflet-control-layers-overlays label { font-weight: 400; }
    .layer-swatch {
      display: inline-block; width: 12px; height: 12px; border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.2); flex-shrink: 0;
    }
    .route-icao-label {
      font-weight: 600; font-size: 11px;
      background: rgba(255,255,255,0.9);
      border: 1px solid #2563eb;
      padding: 1px 4px; border-radius: 3px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <header>
    <div style="font-weight:600">Terrain + Fuel Route Planner (MVP)</div>
    <div class="muted">S300C defaults prefilled • Fuel stops: public-use only • Fuel type: 100LL/Jet-A • Terrain avoidance via SRTM grid A*</div>
  </header>

  <div class="wrap">
    <div class="card">
      <div style="font-weight:600">Inputs</div>

      <label>Departure ICAO</label>
      <input id="dep" value="KSZT" />

      <label>Arrival ICAO</label>
      <input id="arr" value="E60" />

      <label>Intermediate waypoints (space-sep; all refuel by default, append <code>-NF</code> to skip fuel)</label>
      <input id="waypoints" placeholder="e.g. KBOI N86-NF KSLC" />

      <label>Fuel type required (for stops)</label>
      <select id="fuelType">
        <option value="100LL" selected>100LL</option>
        <option value="JETA">Jet-A</option>
      </select>

      <label>Reserve (minutes)</label>
      <input id="reserveMin" type="number" value="30" min="0" step="1" />

      <label>Cruise speed (kt)</label>
      <input id="speedKt" type="number" value="75" min="1" step="1" />

      <label>Usable fuel (gal)</label>
      <input id="usableFuel" type="number" value="48" min="0" step="0.1" />

      <label>Fuel burn (gph)</label>
      <input id="burnGph" type="number" value="13" min="0" step="0.1" />

      <label>Max altitude (ft MSL)</label>
      <input id="maxMsl" type="number" value="7000" min="0" step="50" />

      <label>Min altitude (ft AGL)</label>
      <input id="minAgl" type="number" value="200" min="0" step="50" />

      <label>Flight mode</label>
      <div class="radio-group">
        <label><input type="radio" name="flightMode" value="maxmsl" checked /> Fly at max MSL</label>
        <label><input type="radio" name="flightMode" value="terrain" /> Terrain following</label>
      </div>

      <div id="terrainFollowOpts">
      <label>Max climb rate (fpm) — 0 = unlimited</label>
      <input id="maxClimb" type="number" value="0" min="0" step="50" placeholder="e.g. 700" />

      <label>Climb speed (kt) — 0 = use cruise</label>
      <input id="climbSpeedKt" type="number" value="0" min="0" step="1" placeholder="e.g. 65" />

      <label>Max descent rate (fpm) — 0 = unlimited</label>
      <input id="maxDescent" type="number" value="0" min="0" step="50" placeholder="e.g. 500" />

      <label>Descent speed (kt) — 0 = use cruise</label>
      <input id="descentSpeedKt" type="number" value="0" min="0" step="1" placeholder="e.g. 90" />
      </div>

      <label style="margin-top:10px; font-weight:600">Obstacle avoidance</label>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px 12px; font-size:0.85em; margin-top:4px">
        <label style="margin:0">Radius (NM)</label>
        <label style="margin:0">Clearance (ft above)</label>
        <input id="obsRadius" type="number" value="0.5" min="0" max="5" step="0.1" />
        <input id="obsClearance" type="number" value="500" min="0" max="2000" step="100" />
      </div>

      <label style="margin-top:10px; font-weight:600">Airspace avoidance</label>
      <div style="display:flex; align-items:center; gap:6px; margin:4px 0 6px">
        <input type="checkbox" id="adsbOut" checked style="width:auto" />
        <label for="adsbOut" style="margin:0; display:inline; font-size:13px">ADS-B Out equipped</label>
      </div>
      <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:2px 0; font-size:0.82em" id="avoidChecks">
        <label style="margin:0; display:flex; align-items:center; gap:3px"><input type="checkbox" value="P" checked disabled style="width:auto" /> Prohibited</label>
        <label style="margin:0; display:flex; align-items:center; gap:3px"><input type="checkbox" value="R" checked style="width:auto" /> Restricted</label>
        <label style="margin:0; display:flex; align-items:center; gap:3px"><input type="checkbox" value="MOA" style="width:auto" /> MOA</label>
        <label style="margin:0; display:flex; align-items:center; gap:3px"><input type="checkbox" value="W" style="width:auto" /> Warning</label>
        <label style="margin:0; display:flex; align-items:center; gap:3px"><input type="checkbox" value="A" style="width:auto" /> Alert</label>
        <label style="margin:0; display:flex; align-items:center; gap:3px"><input type="checkbox" value="B" class="adsb-gate" style="width:auto" /> Class B</label>
        <label style="margin:0; display:flex; align-items:center; gap:3px"><input type="checkbox" value="C" class="adsb-gate" style="width:auto" /> Class C</label>
        <label style="margin:0; display:flex; align-items:center; gap:3px"><input type="checkbox" value="D" style="width:auto" /> Class D</label>
      </div>

      <label>Max detour factor: <span id="detourVal">1.8</span>x</label>
      <input id="detour" type="range" min="1" max="5" value="1.8" step="0.1" />

      <details>
        <summary>Advanced (hidden for MVP)</summary>
        <div class="muted">Grid is fixed at ~1 km; corridor expansion is automatic.</div>
      </details>

      <div style="position:relative; margin-top:12px">
        <button id="goBtn" style="margin:0">Plan route</button>
        <button id="abortBtn">Abort Planning</button>
      </div>

      <label>Saved routes</label>
      <div style="display:flex; gap:6px; align-items:center; margin-top:4px">
        <select id="savedRoutes" style="flex:1; margin:0"><option value="">&mdash; none &mdash;</option></select>
        <button id="saveBtn" type="button" style="background:#16a34a; margin:0; padding:6px 12px; width:auto; font-size:12px; border-radius:6px" title="Save current inputs">Save</button>
        <button id="deleteBtn" type="button" style="background:transparent; border:1px solid #d1d5db; color:#6b7280; margin:0; padding:5px 8px; width:auto; font-size:13px; border-radius:6px; cursor:pointer" title="Delete selected saved route">&times;</button>
      </div>
      <div class="watch-row">
        <input type="checkbox" id="watchSearch" checked />
        <label for="watchSearch" style="margin:0; display:inline">Watch A* search on map</label>
      </div>
      <div id="status" class="muted" style="margin-top:10px"></div>
      <div id="error" class="err" style="margin-top:8px"></div>
      <div id="cacheStats" class="muted" style="margin-top:12px; font-size:0.8em; border-top:1px solid #ddd; padding-top:6px"></div>
    </div>

    <div class="card">
      <div id="map"></div>
      <div id="profileWrap">
        <div class="profile-title">Elevation Profile (side view)
          <span class="profile-controls">
            <label style="font-size:11px; font-weight:normal; margin:0 4px 0 0">Corridor:</label>
            <input id="profileCorridorNm" type="number" value="2" min="0.5" max="10" step="0.5" style="width:50px; padding:2px 4px; font-size:11px; border:1px solid #ccc; border-radius:4px; margin-right:6px" title="Obstacle display corridor width (NM each side)" />
            <span style="font-size:10px; color:#888; margin-right:8px">NM</span>
            <button id="profileZoomIn" title="Zoom in">+</button>
            <button id="profileZoomOut" title="Zoom out">&minus;</button>
            <button id="profileReset" title="Reset zoom">Reset</button>
          </span>
        </div>
        <canvas id="profileCanvas"></canvas>
      </div>
      <div id="results" style="margin-top:10px"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <script>
    const detour = document.getElementById('detour');
    const detourVal = document.getElementById('detourVal');
    detour.addEventListener('input', () => detourVal.textContent = detour.value);

    // ADS-B Out logic: when unchecked, force-check B & C avoidance
    const adsbOut = document.getElementById('adsbOut');
    const gateBoxes = document.querySelectorAll('#avoidChecks input.adsb-gate');
    adsbOut.addEventListener('change', () => {
      gateBoxes.forEach(cb => {
        if (!adsbOut.checked) {
          cb.checked = true;
          cb.disabled = true;
        } else {
          cb.disabled = false;
        }
      });
    });
    adsbOut.dispatchEvent(new Event('change'));  // apply initial state

    const map = L.map('map').setView([39.0, -105.5], 5);

    const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap'
    });

    const usgsTopo = L.tileLayer('https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 16,
      attribution: 'USGS'
    });

    const openTopo = L.tileLayer('https://tile.opentopomap.org/{z}/{x}/{y}.png', {
      maxZoom: 17,
      attribution: '&copy; OpenTopoMap'
    });

    const esriImagery = L.tileLayer('https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryTopo/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 16,
      attribution: 'USGS Imagery'
    });

    const vfrSectional = L.tileLayer('https://tiles.arcgis.com/tiles/ssFJjBXIUyZDrSYZ/arcgis/rest/services/VFR_Sectional/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 12,
      attribution: 'FAA VFR Sectional'
    });

    const vfrWorld = L.tileLayer('https://tiles.arcgis.com/tiles/ssFJjBXIUyZDrSYZ/arcgis/rest/services/World_Aeronautical_702583/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 10,
      attribution: 'FAA World Aeronautical'
    });

    const obstacleGroup = L.layerGroup().addTo(map);
    const airspaceGroup = L.layerGroup().addTo(map);

    openTopo.addTo(map);  // default to OpenTopoMap

    L.control.layers({
      '🗺️ USGS Topo': usgsTopo,
      '🏔️ OpenTopoMap': openTopo,
      '🛰️ Satellite + Labels': esriImagery,
      '🛣️ Street Map': osmLayer,
      '🛩️ VFR Sectional': vfrSectional,
      '🌍 World Aeronautical': vfrWorld,
    }, {
      '<span class="layer-swatch" style="background:#2060cc"></span> Airspace': airspaceGroup,
      '<span class="layer-swatch" style="background:#cc3300"></span> Obstacles (FAA)': obstacleGroup,
    }, { position: 'topright', collapsed: true }).addTo(map);

    let exploreGroup = L.layerGroup().addTo(map);
    let layerGroup = L.layerGroup().addTo(map);
    let airportFuelGroup = L.layerGroup().addTo(map);
    let airportOtherGroup = L.layerGroup().addTo(map);
    let abortController = null;
    let airportsLoaded = false;
    let airportLookup = {};  // ICAO → {elev, name, ...}

    // ── Obstacle layer: load on map move when zoomed in ──
    let _obsFetchController = null;
    const OBS_MIN_ZOOM = 8;

    function obstacleIcon(agl, lit) {
      const h = Math.min(agl, 2000);
      // Red intensity by height: taller = more opaque/red
      const t = Math.min(h / 1000, 1);
      const r = Math.round(180 + 75 * t);
      const color = lit ? `rgb(${r},0,0)` : `rgb(${r},80,0)`;
      const size = Math.max(5, Math.min(10, 4 + h / 300));
      return { color, size };
    }

    async function loadObstacles() {
      const z = map.getZoom();
      obstacleGroup.clearLayers();
      if (z < OBS_MIN_ZOOM) return;

      const b = map.getBounds();
      const params = new URLSearchParams({
        south: b.getSouth().toFixed(4),
        north: b.getNorth().toFixed(4),
        west: b.getWest().toFixed(4),
        east: b.getEast().toFixed(4),
        min_agl: '200',
      });

      if (_obsFetchController) _obsFetchController.abort();
      _obsFetchController = new AbortController();

      try {
        const resp = await fetch('/obstacles?' + params, { signal: _obsFetchController.signal });
        const data = await resp.json();
        for (const o of data) {
          const { color, size } = obstacleIcon(o.agl, o.lit);
          L.circleMarker([o.lat, o.lon], {
            radius: size, color, fillColor: color,
            fillOpacity: 0.7, weight: 1, opacity: 0.9,
          }).bindPopup(
            `<b>${o.type}</b><br>${o.agl}' AGL / ${o.amsl}' MSL${o.lit ? '<br>Lighted' : ''}`
          ).addTo(obstacleGroup);
        }
      } catch (e) {
        if (e.name !== 'AbortError') console.warn('Obstacle load error:', e);
      }
    }

    map.on('moveend', loadObstacles);
    map.on('zoomend', loadObstacles);

    /* ── Airspace layer ─────────────────────────────────────────── */
    const AIRSPACE_MIN_ZOOM = 7;
    const AIRSPACE_STYLE = {
      B:   { color: '#2060cc', fill: 0.06, dash: null,  label: 'Class B' },
      C:   { color: '#cc00cc', fill: 0.06, dash: null,  label: 'Class C' },
      D:   { color: '#2060cc', fill: 0.05, dash: '6 4', label: 'Class D' },
      R:   { color: '#cc0000', fill: 0.10, dash: null,  label: 'Restricted' },
      P:   { color: '#cc0000', fill: 0.15, dash: null,  label: 'Prohibited' },
      W:   { color: '#cc8800', fill: 0.08, dash: '8 4', label: 'Warning' },
      MOA: { color: '#886600', fill: 0.06, dash: '6 6', label: 'MOA' },
      A:   { color: '#cc8800', fill: 0.06, dash: '4 4', label: 'Alert' },
      DA:  { color: '#cc0000', fill: 0.08, dash: '8 4', label: 'Danger' },
    };
    let _asFetchController = null;

    async function loadAirspace() {
      const z = map.getZoom();
      airspaceGroup.clearLayers();
      if (z < AIRSPACE_MIN_ZOOM) return;

      const b = map.getBounds();
      const params = new URLSearchParams({
        south: b.getSouth().toFixed(4),
        north: b.getNorth().toFixed(4),
        west: b.getWest().toFixed(4),
        east: b.getEast().toFixed(4),
        classes: 'B,C,D,R,P,W,MOA,A',
      });

      if (_asFetchController) _asFetchController.abort();
      _asFetchController = new AbortController();

      try {
        const resp = await fetch('/airspace?' + params, { signal: _asFetchController.signal });
        const data = await resp.json();
        for (const a of data) {
          const cls = a.class;
          const st = AIRSPACE_STYLE[cls] || { color: '#888', fill: 0.05, dash: null, label: cls };
          const coords = a.geometry.coordinates;
          const latLngs = coords.map(ring => ring.map(pt => [pt[1], pt[0]]));
          const poly = L.polygon(latLngs, {
            color: st.color, weight: 2, opacity: 0.8,
            fillColor: st.color, fillOpacity: st.fill,
            dashArray: st.dash,
          });
          const lowerStr = a.lower_code === 'SFC' ? 'SFC' : `${a.lower_alt}' ${a.lower_code}`;
          const upperStr = `${a.upper_alt}' ${a.upper_code}`;
          let popup = `<b>${st.label}</b> — ${a.name || a.ident}<br>${lowerStr} → ${upperStr}`;
          if (a.times_of_use) popup += `<br><i>${a.times_of_use}</i>`;
          poly.bindPopup(popup);
          poly.addTo(airspaceGroup);
        }
      } catch (e) {
        if (e.name !== 'AbortError') console.warn('Airspace load error:', e);
      }
    }

    map.on('moveend', loadAirspace);
    map.on('zoomend', loadAirspace);

    function apLabel(icao) {
      const ap = airportLookup[icao];
      return ap ? `${icao} (${Math.round(ap.elev)}')` : icao;
    }

    function clearMap() {
      layerGroup.clearLayers();
      exploreGroup.clearLayers();
      routeMarkers = [];
      document.getElementById('profileWrap').classList.remove('visible');
      lastProfileArgs = null;
    }

    async function loadAirports() {
      if (airportsLoaded) return;
      try {
        const res = await fetch('/airports');
        if (!res.ok) return;
        const list = await res.json();
        airportsLoaded = true;
        for (const ap of list) {
          airportLookup[ap.icao] = ap;
          const isPrivate = ap.facility_use && ap.facility_use !== 'PU';
          const hasFuel = ap.fuel_100ll || ap.fuel_jeta;
          const color = isPrivate ? '#b45309' : (hasFuel ? '#16a34a' : '#6b7280');
          const radius = isPrivate ? 3 : 4;
          const fuelStr = [ap.fuel_100ll ? '100LL' : '', ap.fuel_jeta ? 'Jet-A' : ''].filter(Boolean).join(', ') || 'None';
          const pvtStr = isPrivate ? ' (Private)' : '';
          const targetGroup = (!isPrivate && hasFuel) ? airportFuelGroup : airportOtherGroup;
          L.circleMarker([ap.lat, ap.lon], {
            radius, color, fillColor: color,
            fillOpacity: isPrivate ? 0.5 : 0.7, weight: 1, opacity: isPrivate ? 0.6 : 0.8,
          }).bindTooltip(`<b>${ap.icao}</b>${pvtStr}<br>${ap.name}<br>Elev: ${Math.round(ap.elev)} ft<br>Fuel: ${fuelStr}`, {
            direction: 'top', offset: [0, -6],
          }).addTo(targetGroup);
        }
      } catch (e) { /* silent */ }
    }

    // Load airports on startup
    loadAirports();

    // ── Map declutter: auto-show/hide layers by zoom ──
    let routeMarkers = [];  // track route markers for label management

    function updateMapDeclutter() {
      const z = map.getZoom();
      // Background airports: hide at low zoom, fuel-only at medium
      if (z < 8) {
        if (map.hasLayer(airportFuelGroup)) map.removeLayer(airportFuelGroup);
        if (map.hasLayer(airportOtherGroup)) map.removeLayer(airportOtherGroup);
      } else if (z < 10) {
        if (!map.hasLayer(airportFuelGroup)) map.addLayer(airportFuelGroup);
        if (map.hasLayer(airportOtherGroup)) map.removeLayer(airportOtherGroup);
      } else {
        if (!map.hasLayer(airportFuelGroup)) map.addLayer(airportFuelGroup);
        if (!map.hasLayer(airportOtherGroup)) map.addLayer(airportOtherGroup);
      }
      // Route marker ICAO labels: hide intermediate labels when zoomed out
      for (const rm of routeMarkers) {
        if (rm.isEndpoint) {
          rm.marker.openTooltip();
        } else {
          if (z >= 9) rm.marker.openTooltip(); else rm.marker.closeTooltip();
        }
      }
    }
    map.on('zoomend', updateMapDeclutter);
    updateMapDeclutter();

    // Toggle terrain-follow options visibility
    const terrainOpts = document.getElementById('terrainFollowOpts');
    document.querySelectorAll('input[name="flightMode"]').forEach(radio => {
      radio.addEventListener('change', () => {
        terrainOpts.style.display = radio.value === 'terrain' && radio.checked ? '' : 'none';
      });
    });
    terrainOpts.style.display = 'none'; // hidden by default (Max MSL mode)

    // ── Profile zoom/pan state ──
    let profileState = { zoom: 1, panX: 0, dragging: false, dragStartX: 0, dragStartPanX: 0 };
    let lastProfileArgs = null;  // cached args for redraw on zoom/pan
    let lastProfilePath = null;  // cached route path [[lat,lon],...] for click-to-map
    let profileCursorDist = null; // distance (NM) of cursor from map click

    function profileResetZoom() {
      profileState.zoom = 1; profileState.panX = 0;
      if (lastProfileArgs) drawProfile(...lastProfileArgs);
    }
    document.getElementById('profileZoomIn').addEventListener('click', () => {
      profileState.zoom = Math.min(profileState.zoom * 1.5, 50);
      if (lastProfileArgs) drawProfile(...lastProfileArgs);
    });
    document.getElementById('profileZoomOut').addEventListener('click', () => {
      profileState.zoom = Math.max(profileState.zoom / 1.5, 1);
      if (profileState.zoom === 1) profileState.panX = 0;
      if (lastProfileArgs) drawProfile(...lastProfileArgs);
    });
    document.getElementById('profileReset').addEventListener('click', profileResetZoom);

    (function initProfileInteraction() {
      const canvas = document.getElementById('profileCanvas');
      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const oldZoom = profileState.zoom;
        const factor = e.deltaY < 0 ? 1.25 : 0.8;
        profileState.zoom = Math.max(1, Math.min(profileState.zoom * factor, 50));
        // Zoom toward mouse position
        const ratio = profileState.zoom / oldZoom;
        profileState.panX = mouseX - ratio * (mouseX - profileState.panX);
        // Clamp pan
        const maxPan = (profileState.zoom - 1) * rect.width;
        profileState.panX = Math.min(0, Math.max(-maxPan, profileState.panX));
        if (profileState.zoom === 1) profileState.panX = 0;
        if (lastProfileArgs) drawProfile(...lastProfileArgs);
      }, { passive: false });
      canvas.addEventListener('mousedown', (e) => {
        if (profileState.zoom <= 1) return;
        profileState.dragging = true;
        profileState.dragStartX = e.clientX;
        profileState.dragStartPanX = profileState.panX;
      });
      window.addEventListener('mousemove', (e) => {
        if (!profileState.dragging) return;
        const rect = canvas.getBoundingClientRect();
        const dx = e.clientX - profileState.dragStartX;
        const maxPan = (profileState.zoom - 1) * rect.width;
        profileState.panX = Math.min(0, Math.max(-maxPan, profileState.dragStartPanX + dx));
        if (lastProfileArgs) drawProfile(...lastProfileArgs);
      });
      window.addEventListener('mouseup', () => { profileState.dragging = false; });

      // Click on profile → center map to that location
      let profileClickMarker = null;
      canvas.addEventListener('click', (e) => {
        if (!lastProfileArgs || !lastProfilePath) return;
        // Ignore if the user was dragging
        if (Math.abs(e.clientX - profileState.dragStartX) > 5 && profileState.dragStartX) return;
        profileCursorDist = null;  // clear map-sourced cursor
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const data = lastProfileArgs[0];
        const dist = data.dist_nm;
        const maxDist = dist[dist.length - 1] || 1;
        const pad = { left: 55, right: 20 };
        const pw = rect.width - pad.left - pad.right;
        // Inverse of x(d): d = ((mouseX - pad.left - panOffset) / (pw * zoom)) * maxDist
        const d = ((mouseX - pad.left - profileState.panX) / (pw * profileState.zoom)) * maxDist;
        if (d < 0 || d > maxDist) return;
        // Build cumulative distances for the path
        const path = lastProfilePath;
        const cumDist = [0];
        for (let i = 1; i < path.length; i++) {
          cumDist.push(cumDist[i-1] + haversineNm(path[i-1][0], path[i-1][1], path[i][0], path[i][1]));
        }
        // Interpolate lat/lon at distance d
        let lat, lon;
        for (let i = 0; i < cumDist.length - 1; i++) {
          if (cumDist[i+1] >= d) {
            const segLen = cumDist[i+1] - cumDist[i];
            const t = segLen > 0 ? (d - cumDist[i]) / segLen : 0;
            lat = path[i][0] + t * (path[i+1][0] - path[i][0]);
            lon = path[i][1] + t * (path[i+1][1] - path[i][1]);
            break;
          }
        }
        if (lat == null) { lat = path[path.length-1][0]; lon = path[path.length-1][1]; }
        // Center map and show a temporary marker
        map.setView([lat, lon], Math.max(map.getZoom(), 10));
        if (profileClickMarker) map.removeLayer(profileClickMarker);
        profileClickMarker = L.circleMarker([lat, lon], {
          radius: 8, color: '#e11d48', fillColor: '#e11d48', fillOpacity: 0.5, weight: 2
        }).addTo(map);
        setTimeout(() => { if (profileClickMarker) { map.removeLayer(profileClickMarker); profileClickMarker = null; } }, 3000);
      });
    })();

    // Re-fetch obstacles when corridor width changes
    document.getElementById('profileCorridorNm').addEventListener('change', () => {
      if (!lastProfilePath || !lastProfileArgs) return;
      const data = lastProfileArgs[0];
      const args = lastProfileArgs;
      // Re-run fetchAndDrawProfile with the stored path
      // We need the original call params — re-trigger from the stored path
      const depLabel = args[1], arrLabel = args[2];
      const cruiseKt = args[3], maxClimbFpm = args[4], maxDescentFpm = args[5];
      const climbSpeedKt = args[6], descentSpeedKt = args[7], terrainFollow = args[8], legsList = args[9];
      fetchAndDrawProfile(lastProfilePath, data.max_msl_ft, data.min_agl_ft || 200,
        depLabel, arrLabel, cruiseKt, maxClimbFpm, maxDescentFpm, climbSpeedKt, descentSpeedKt, terrainFollow, [], legsList);
    });

    async function fetchAndDrawProfile(path, maxMsl, minAgl, depLabel, arrLabel, cruiseKt, maxClimbFpm, maxDescentFpm, climbSpeedKt, descentSpeedKt, terrainFollow, avoidAirspace, legsList) {
      profileCursorDist = null;  // clear map-click cursor on new profile
      try {
        const body = { path, max_msl_ft: maxMsl, min_agl_ft: minAgl };
        if (avoidAirspace && avoidAirspace.length) body.avoid_airspace = avoidAirspace;
        const res = await fetch('/elevation-profile', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify(body),
        });
        if (!res.ok) return;
        const data = await res.json();

        // Fetch obstacles within user-defined corridor of route
        let profileObstacles = [];
        try {
          const CORRIDOR_NM = Number(document.getElementById('profileCorridorNm').value) || 2;
          const degBuf = CORRIDOR_NM / 60;  // ~1 NM ≈ 1 arcminute
          let south = Infinity, north = -Infinity, west = Infinity, east = -Infinity;
          for (const p of path) {
            if (p[0] < south) south = p[0];
            if (p[0] > north) north = p[0];
            if (p[1] < west) west = p[1];
            if (p[1] > east) east = p[1];
          }
          const obsParams = new URLSearchParams({
            south: (south - degBuf).toFixed(4),
            north: (north + degBuf).toFixed(4),
            west: (west - degBuf).toFixed(4),
            east: (east + degBuf).toFixed(4),
            min_agl: '0',
          });
          const obsResp = await fetch('/obstacles?' + obsParams);
          if (obsResp.ok) {
            const allObs = await obsResp.json();
            // Build cumulative distances for projection
            const cumDist = [0];
            for (let i = 1; i < path.length; i++) {
              cumDist.push(cumDist[i-1] + haversineNm(path[i-1][0], path[i-1][1], path[i][0], path[i][1]));
            }
            const totalDist = cumDist[cumDist.length - 1] || 1;
            // Project each obstacle onto the route, keep if within corridor
            for (const o of allObs) {
              let bestDist = Infinity, bestProj = 0;
              for (let i = 0; i < path.length - 1; i++) {
                const ax = path[i][1], ay = path[i][0];
                const bx = path[i+1][1], by = path[i+1][0];
                const dx = bx - ax, dy = by - ay;
                const segLen2 = dx*dx + dy*dy;
                let t = segLen2 > 0 ? ((o.lon - ax)*dx + (o.lat - ay)*dy) / segLen2 : 0;
                t = Math.max(0, Math.min(1, t));
                const projLat = ay + t * dy, projLon = ax + t * dx;
                const d = haversineNm(o.lat, o.lon, projLat, projLon);
                if (d < bestDist) {
                  bestDist = d;
                  bestProj = cumDist[i] + t * (cumDist[i+1] - cumDist[i]);
                }
              }
              if (bestDist <= CORRIDOR_NM) {
                profileObstacles.push({ distNm: bestProj, agl: o.agl, amsl: o.amsl, type: o.type, lit: !!o.lit });
              }
            }
          }
        } catch (e) { /* silent — obstacles are optional */ }

        data._profileObstacles = profileObstacles;
        lastProfilePath = path;  // store for click-to-map
        profileState.zoom = 1; profileState.panX = 0;  // reset zoom on new route
        drawProfile(data, depLabel, arrLabel, cruiseKt, maxClimbFpm, maxDescentFpm, climbSpeedKt, descentSpeedKt, terrainFollow, legsList);
      } catch (e) { /* silent */ }
    }

    function drawProfile(data, depLabel, arrLabel, cruiseKt, maxClimbFpm, maxDescentFpm, climbSpeedKt, descentSpeedKt, terrainFollow, legsList) {
      lastProfileArgs = [data, depLabel, arrLabel, cruiseKt, maxClimbFpm, maxDescentFpm, climbSpeedKt, descentSpeedKt, terrainFollow, legsList];
      const wrap = document.getElementById('profileWrap');
      const canvas = document.getElementById('profileCanvas');
      wrap.classList.add('visible');

      // Hi-DPI support
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      const W = rect.width, H = rect.height;

      const pad = { top: 20, right: 20, bottom: 30, left: 55 };
      const pw = W - pad.left - pad.right;
      const ph = H - pad.top - pad.bottom;

      const dist = data.dist_nm;
      const ground = data.ground_ft;
      const maxMsl = data.max_msl_ft;
      const minAgl = data.min_agl_ft;

      const maxDist = dist[dist.length - 1] || 1;
      // Include airspace ceilings in Y-axis range so bands are fully visible
      let peakAlt = Math.max(maxMsl, ...ground);
      for (const z of (data.airspace_zones || [])) {
        for (const c of z.ceiling_msl) peakAlt = Math.max(peakAlt, c);
      }
      for (const ob of (data._profileObstacles || [])) {
        peakAlt = Math.max(peakAlt, ob.amsl);
      }
      const maxElev = peakAlt * 1.1;

      // Zoom/pan-aware coordinate transforms
      const zoomFactor = profileState.zoom;
      const panOffset = profileState.panX;
      function x(d) { return pad.left + ((d / maxDist) * pw) * zoomFactor + panOffset; }
      function y(e) { return pad.top + ph - (e / maxElev) * ph; }

      ctx.clearRect(0, 0, W, H);

      // Grid lines — elevation ticks (always full width)
      ctx.strokeStyle = '#e5e7eb';
      ctx.lineWidth = 0.5;
      const elevTicks = 5;
      for (let i = 0; i <= elevTicks; i++) {
        const ev = (maxElev / elevTicks) * i;
        ctx.beginPath(); ctx.moveTo(pad.left, y(ev)); ctx.lineTo(W - pad.right, y(ev)); ctx.stroke();
        ctx.fillStyle = '#6b7280'; ctx.font = '10px system-ui';
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillText(Math.round(ev).toLocaleString() + ' ft', pad.left - 4, y(ev));
      }

      // Distance labels — adaptive tick spacing for zoom
      const visibleNm = maxDist / zoomFactor;
      let distStep;
      if (visibleNm > 200) distStep = 50;
      else if (visibleNm > 100) distStep = 25;
      else if (visibleNm > 40) distStep = 10;
      else if (visibleNm > 15) distStep = 5;
      else if (visibleNm > 5) distStep = 2;
      else distStep = 1;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      for (let d = 0; d <= maxDist; d += distStep) {
        const xp = x(d);
        if (xp < pad.left - 10 || xp > W - pad.right + 10) continue;
        ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(xp, pad.top); ctx.lineTo(xp, H - pad.bottom); ctx.stroke();
        ctx.fillStyle = '#6b7280'; ctx.font = '10px system-ui';
        ctx.fillText(Math.round(d) + ' NM', xp, H - pad.bottom + 4);
      }

      // Clip to plot area for all zoomed drawing
      ctx.save();
      ctx.beginPath();
      ctx.rect(pad.left, 0, pw, H);
      ctx.clip();

      // Max MSL ceiling line
      ctx.strokeStyle = '#dc2626';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.moveTo(pad.left, y(maxMsl)); ctx.lineTo(W - pad.right, y(maxMsl)); ctx.stroke();
      ctx.setLineDash([]);
      if (zoomFactor >= 1.3) {
        ctx.fillStyle = '#dc2626'; ctx.font = '10px system-ui'; ctx.textAlign = 'left';
        ctx.fillText('Max MSL ' + maxMsl.toLocaleString() + ' ft', pad.left + 4, y(maxMsl) - 12);
      }

      // Min AGL band (terrain + minAgl) — hide when zoomed out to reduce clutter
      if (zoomFactor >= 1.3) {
      ctx.fillStyle = 'rgba(239, 68, 68, 0.08)';
      ctx.beginPath();
      ctx.moveTo(x(dist[0]), y(ground[0] + minAgl));
      for (let i = 1; i < dist.length; i++) ctx.lineTo(x(dist[i]), y(ground[i] + minAgl));
      for (let i = dist.length - 1; i >= 0; i--) ctx.lineTo(x(dist[i]), y(ground[i]));
      ctx.closePath(); ctx.fill();
      }

      // Terrain fill
      ctx.fillStyle = 'rgba(180, 140, 100, 0.35)';
      ctx.beginPath();
      ctx.moveTo(x(dist[0]), y(0));
      for (let i = 0; i < dist.length; i++) ctx.lineTo(x(dist[i]), y(ground[i]));
      ctx.lineTo(x(dist[dist.length-1]), y(0));
      ctx.closePath(); ctx.fill();

      // Terrain line
      ctx.strokeStyle = '#92400e';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x(dist[0]), y(ground[0]));
      for (let i = 1; i < dist.length; i++) ctx.lineTo(x(dist[i]), y(ground[i]));
      ctx.stroke();

      // Min AGL line above terrain — hide when zoomed out
      if (zoomFactor >= 1.3) {
      ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(x(dist[0]), y(ground[0] + minAgl));
      for (let i = 1; i < dist.length; i++) ctx.lineTo(x(dist[i]), y(ground[i] + minAgl));
      ctx.stroke();
      ctx.setLineDash([]);
      }

      // ── Obstacles along the route corridor ──
      const profileObs = data._profileObstacles || [];
      for (const ob of profileObs) {
        const px = x(ob.distNm);
        if (px < pad.left - 10 || px > W - pad.right + 10) continue;
        // Find ground elevation at this distance
        let groundAtObs = 0;
        for (let i = 0; i < dist.length - 1; i++) {
          if (dist[i + 1] >= ob.distNm) {
            const t = (dist[i + 1] - dist[i]) > 0 ? (ob.distNm - dist[i]) / (dist[i + 1] - dist[i]) : 0;
            groundAtObs = ground[i] + t * (ground[i + 1] - ground[i]);
            break;
          }
        }
        if (ob.distNm >= dist[dist.length - 1]) groundAtObs = ground[ground.length - 1];
        const topMsl = groundAtObs + ob.agl;
        const baseY = y(groundAtObs);
        const topY = y(topMsl);
        // Obstacle cylinder: red/orange bar
        const obsColor = ob.lit ? 'rgba(220,38,38,0.7)' : 'rgba(220,100,20,0.7)';
        ctx.strokeStyle = obsColor;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(px, baseY);
        ctx.lineTo(px, topY);
        ctx.stroke();
        // Top cap
        ctx.fillStyle = obsColor;
        ctx.beginPath();
        ctx.arc(px, topY, 3, 0, Math.PI * 2);
        ctx.fill();
        // AGL label — show when zoomed in enough
        if (zoomFactor >= 1.5) {
          ctx.fillStyle = obsColor;
          ctx.font = '9px system-ui';
          ctx.textAlign = 'left';
          ctx.fillText(ob.agl + "' AGL", px + 5, topY + 3);
        }
      }

      // ── Airspace zones: draw bands and build per-sample constraints ──
      const BUF = 100; // vertical buffer feet
      const zones = data.airspace_zones || [];
      // Per-sample: lowest ceiling we must stay under, highest floor we must stay over
      // null means no airspace constraint at that sample
      const asFloor = new Array(dist.length).fill(null);  // airspace floor MSL
      const asCeil  = new Array(dist.length).fill(null);  // airspace ceiling MSL

      const zoneColors = {
        B: 'rgba(59,130,246,0.15)', C: 'rgba(139,92,246,0.15)',
        D: 'rgba(16,185,129,0.15)', R: 'rgba(239,68,68,0.20)',
        P: 'rgba(239,68,68,0.25)', MOA: 'rgba(234,179,8,0.15)',
        A: 'rgba(107,114,128,0.15)',
      };
      const zoneBorderColors = {
        B: 'rgba(59,130,246,0.6)', C: 'rgba(139,92,246,0.6)',
        D: 'rgba(16,185,129,0.6)', R: 'rgba(239,68,68,0.6)',
        P: 'rgba(239,68,68,0.7)', MOA: 'rgba(234,179,8,0.6)',
        A: 'rgba(107,114,128,0.6)',
      };

      for (const z of zones) {
        const s = z.start_idx, e = z.end_idx;
        const fl = z.floor_msl, cl = z.ceiling_msl;
        const fill = zoneColors[z.cls] || 'rgba(107,114,128,0.12)';
        const border = zoneBorderColors[z.cls] || 'rgba(107,114,128,0.5)';

        // Draw shaded band for this airspace zone
        ctx.fillStyle = fill;
        ctx.beginPath();
        ctx.moveTo(x(dist[s]), y(cl[0]));
        for (let i = s; i <= e; i++) ctx.lineTo(x(dist[i]), y(cl[i - s]));
        for (let i = e; i >= s; i--) ctx.lineTo(x(dist[i]), y(fl[i - s]));
        ctx.closePath();
        ctx.fill();

        // Top and bottom border lines
        ctx.strokeStyle = border;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(x(dist[s]), y(cl[0]));
        for (let i = s + 1; i <= e; i++) ctx.lineTo(x(dist[i]), y(cl[i - s]));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x(dist[s]), y(fl[0]));
        for (let i = s + 1; i <= e; i++) ctx.lineTo(x(dist[i]), y(fl[i - s]));
        ctx.stroke();
        ctx.setLineDash([]);

        // Label — only if zone spans enough pixels to be readable
        const midIdx = Math.floor((s + e) / 2);
        const midCeil = cl[midIdx - s];
        const zonePxWidth = x(dist[e]) - x(dist[s]);
        if (zonePxWidth > 40) {
          ctx.fillStyle = border;
          ctx.font = '9px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText(z.name + ' (' + z.cls + ')', x(dist[midIdx]), y(midCeil) - 3);
        }

        // Store constraints for flight altitude
        for (let i = s; i <= e; i++) {
          const f = fl[i - s];
          const c = cl[i - s];
          if (asFloor[i] === null || f < asFloor[i]) asFloor[i] = f;
          if (asCeil[i] === null || c < asCeil[i]) asCeil[i] = c;
        }
      }

      // ── Flight altitude trace (airspace-aware) ──
      if (terrainFollow && cruiseKt > 0 && (maxClimbFpm > 0 || maxDescentFpm > 0)) {
        const climbKt = climbSpeedKt > 0 ? climbSpeedKt : cruiseKt;
        const descentKt = descentSpeedKt > 0 ? descentSpeedKt : cruiseKt;

        // Compute target altitude at each sample considering airspace.
        // Iterate per-zone so that unavoidable zones (SFC floor + ceiling
        // above maxMsl, e.g. inner Class B shelves at the destination) are
        // ignored while avoidable outer shelves are properly ducked under.
        const target = new Array(dist.length);
        for (let i = 0; i < dist.length; i++) {
          const terrainMin = ground[i] + minAgl;
          let alt = terrainMin; // default: terrain following
          let bestUnder = Infinity;   // lowest underAlt across avoidable zones
          let bestOver  = -Infinity;  // highest overAlt across avoidable zones
          let anyUnder = false, anyOver = false;

          for (const z of zones) {
            if (i < z.start_idx || i > z.end_idx) continue;
            const zFloor = z.floor_msl[i - z.start_idx];
            const zCeil  = z.ceiling_msl[i - z.start_idx];
            const underAlt = zFloor - BUF;
            const overAlt  = zCeil  + BUF;
            if (underAlt >= terrainMin) {
              anyUnder = true;
              bestUnder = Math.min(bestUnder, underAlt);
            } else if (overAlt <= maxMsl) {
              anyOver = true;
              bestOver = Math.max(bestOver, overAlt);
            }
            // else: zone unavoidable vertically (SFC floor + ceiling > maxMsl) — skip
          }

          if (anyUnder) {
            alt = bestUnder;          // prefer ducking under
          } else if (anyOver) {
            alt = bestOver;           // climb over if can't go under
          }
          target[i] = Math.min(Math.max(alt, terrainMin), maxMsl);
        }

        // Backward pass first: compute the latest altitude needed at each point
        // so the aircraft can reach every future target in time.
        const ba = new Array(dist.length);
        ba[dist.length - 1] = target[dist.length - 1];
        for (let i = dist.length - 2; i >= 0; i--) {
          const segDist = dist[i + 1] - dist[i];
          const next = ba[i + 1];
          const terrainMin = ground[i] + minAgl;
          // If next point is lower, we must start descending: max alt here = next + descent capacity
          const dtDescent = (segDist / descentKt) * 60;
          const maxAltForDescent = maxDescentFpm > 0 ? next + maxDescentFpm * dtDescent : Infinity;
          // If next point is higher, we must start climbing: min alt here = next - climb capacity
          const dtClimb = (segDist / climbKt) * 60;
          const minAltForClimb = maxClimbFpm > 0 ? next - maxClimbFpm * dtClimb : -Infinity;
          // ba[i] = target adjusted by what we need to reach ba[i+1]
          let alt = target[i];
          // Can't be higher than what descent to next point allows
          alt = Math.min(alt, maxAltForDescent);
          // Can't be lower than what climb to next point requires
          alt = Math.max(alt, minAltForClimb);
          // Always respect terrain floor and MSL ceiling
          ba[i] = Math.min(Math.max(alt, terrainMin), maxMsl);
        }

        // Forward pass: rate-limited from start, pulled toward backward-pass altitudes
        const fa = [Math.min(Math.max(ba[0], ground[0] + minAgl), maxMsl)];
        for (let i = 1; i < dist.length; i++) {
          const segDist = dist[i] - dist[i - 1];
          const prev = fa[i - 1];
          const terrainMin = ground[i] + minAgl;
          const dtClimb = (segDist / climbKt) * 60;
          const dtDescent = (segDist / descentKt) * 60;
          const ceiling = maxClimbFpm > 0 ? Math.min(prev + maxClimbFpm * dtClimb, maxMsl) : maxMsl;
          const floor = maxDescentFpm > 0 ? Math.max(prev - maxDescentFpm * dtDescent, terrainMin) : terrainMin;
          // Pull toward backward-pass target (which anticipates future constraints)
          fa.push(Math.min(ceiling, Math.max(ba[i], floor)));
        }

        ctx.strokeStyle = '#2563eb';
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(x(dist[0]), y(fa[0]));
        for (let i = 1; i < fa.length; i++) ctx.lineTo(x(dist[i]), y(fa[i]));
        ctx.stroke();
        ctx.fillStyle = '#2563eb'; ctx.font = '10px system-ui'; ctx.textAlign = 'left';
        if (zoomFactor >= 1.5)
          ctx.fillText(zones.length ? 'Flight alt (airspace-aware)' : 'Terrain-follow alt (est.)', pad.left + 4, y(fa[Math.min(5, fa.length - 1)]) - 8);
      } else {
        // Max MSL mode — cruise at maxMsl, but duck under airspace and
        // descend to land / climb from each airport
        const fa = new Array(dist.length);

        // Build list of sample indices where we must be at ground level (airports)
        const apIndices = new Set();
        if (legsList && legsList.length > 0) {
          let cumDist = 0;
          for (let li = 0; li <= legsList.length; li++) {
            const targetDist = cumDist;
            let bestIdx = 0, bestDelta = Infinity;
            for (let i = 0; i < dist.length; i++) {
              const d = Math.abs(dist[i] - targetDist);
              if (d < bestDelta) { bestDelta = d; bestIdx = i; }
            }
            apIndices.add(bestIdx);
            if (li < legsList.length) cumDist += legsList[li].distNm;
          }
        } else {
          apIndices.add(0);
          apIndices.add(dist.length - 1);
        }

        for (let i = 0; i < dist.length; i++) {
          const terrainMin = ground[i] + minAgl;
          if (apIndices.has(i)) {
            // At an airport — altitude is ground level
            fa[i] = ground[i];
            continue;
          }
          let alt = maxMsl; // default: cruise at max MSL

          // Check each zone independently (same per-zone logic as terrain-follow)
          let bestUnder = Infinity;
          let anyUnder = false;

          for (const z of zones) {
            if (i < z.start_idx || i > z.end_idx) continue;
            const zFloor = z.floor_msl[i - z.start_idx];
            const zCeil  = z.ceiling_msl[i - z.start_idx];
            // Does our cruise altitude (maxMsl) penetrate this zone?
            if (maxMsl > zFloor && maxMsl <= zCeil + BUF) {
              // We're inside this zone — can we duck under?
              const underAlt = zFloor - BUF;
              if (underAlt >= terrainMin) {
                anyUnder = true;
                bestUnder = Math.min(bestUnder, underAlt);
              }
              // else: zone is SFC-based or floor too low — unavoidable, skip
            }
          }

          if (anyUnder) {
            alt = bestUnder;
          }
          fa[i] = Math.max(alt, terrainMin);
        }

        // Always apply climb/descent smoothing (needed for airport departures/arrivals)
        const effCruise = cruiseKt > 0 ? cruiseKt : 120; // fallback 120kt
        const effClimb = maxClimbFpm > 0 ? maxClimbFpm : 500;
        const effDescent = maxDescentFpm > 0 ? maxDescentFpm : 500;
        const effClimbKt = climbSpeedKt > 0 ? climbSpeedKt : effCruise;
        const effDescentKt = descentSpeedKt > 0 ? descentSpeedKt : effCruise;

        // Backward pass: ensure we can descend in time for upcoming constraints
        const ba = new Array(dist.length);
        ba[dist.length - 1] = fa[dist.length - 1];
        for (let i = dist.length - 2; i >= 0; i--) {
          const segDist = dist[i + 1] - dist[i];
          const next = ba[i + 1];
          const terrainMin = ground[i] + minAgl;
          const dtDesc = (segDist / effDescentKt) * 60;
          const maxAltHere = next + effDescent * dtDesc;
          const dtClimb = (segDist / effClimbKt) * 60;
          const minAltHere = next - effClimb * dtClimb;
          let alt = fa[i];
          alt = Math.min(alt, maxAltHere);
          alt = Math.max(alt, minAltHere);
          if (apIndices.has(i)) alt = ground[i];  // pin to ground at airports
          ba[i] = Math.min(Math.max(alt, terrainMin), maxMsl);
        }

        // Forward pass: rate-limited, pulled toward backward targets
        const smoothed = [apIndices.has(0) ? ground[0] : Math.min(Math.max(ba[0], ground[0] + minAgl), maxMsl)];
        for (let i = 1; i < dist.length; i++) {
          if (apIndices.has(i)) {
            smoothed.push(ground[i]);  // pin to ground at airports
            continue;
          }
          const segDist = dist[i] - dist[i - 1];
          const prev = smoothed[i - 1];
          const terrainMin = ground[i] + minAgl;
          const dtClimb = (segDist / effClimbKt) * 60;
          const dtDesc = (segDist / effDescentKt) * 60;
          const ceiling = Math.min(prev + effClimb * dtClimb, maxMsl);
          const floor = Math.max(prev - effDescent * dtDesc, terrainMin);
          smoothed.push(Math.min(ceiling, Math.max(ba[i], floor)));
        }
        for (let i = 0; i < dist.length; i++) fa[i] = smoothed[i];

        ctx.strokeStyle = '#2563eb';
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(x(dist[0]), y(fa[0]));
        for (let i = 1; i < fa.length; i++) ctx.lineTo(x(dist[i]), y(fa[i]));
        ctx.stroke();
        ctx.setLineDash([]);
        if (zoomFactor >= 1.5) {
          ctx.fillStyle = '#2563eb'; ctx.font = '10px system-ui'; ctx.textAlign = 'left';
          ctx.fillText('Flight alt (est.)', pad.left + 4, y(fa[Math.min(5, fa.length - 1)]) - 8);
        }
      }

      // ── Airport markers at each leg boundary (drawn last, on top) ──
      const airportMarkers = [];  // {dist, label}
      if (legsList && legsList.length > 0) {
        let cumDist = 0;
        airportMarkers.push({ dist: 0, label: legsList[0].from || depLabel });
        for (const leg of legsList) {
          cumDist += leg.distNm;
          airportMarkers.push({ dist: cumDist, label: leg.to || arrLabel });
        }
      } else {
        airportMarkers.push({ dist: 0, label: depLabel });
        airportMarkers.push({ dist: maxDist, label: arrLabel });
      }

      // Thin out markers that would overlap at current zoom — always keep first & last
      const minPxGap = 60;  // minimum pixels between labels
      const visibleMarkers = [];
      for (let i = 0; i < airportMarkers.length; i++) {
        const ap = airportMarkers[i];
        const isEndpoint = (i === 0 || i === airportMarkers.length - 1);
        if (isEndpoint) { visibleMarkers.push(ap); continue; }
        const px = x(ap.dist);
        if (px < pad.left - 20 || px > W - pad.right + 20) continue;
        // Check distance to last kept marker
        const prevPx = visibleMarkers.length ? x(visibleMarkers[visibleMarkers.length - 1].dist) : -Infinity;
        // Also check distance to the final marker
        const lastPx = x(airportMarkers[airportMarkers.length - 1].dist);
        if (px - prevPx >= minPxGap && lastPx - px >= minPxGap) {
          visibleMarkers.push(ap);
        }
      }

      const showElevation = zoomFactor >= 1.5 || visibleMarkers.length <= 4;
      for (const ap of visibleMarkers) {
        const px = x(ap.dist);
        if (px < pad.left - 20 || px > W - pad.right + 20) continue;
        // Vertical dashed line
        ctx.strokeStyle = 'rgba(55, 65, 81, 0.35)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(px, pad.top);
        ctx.lineTo(px, H - pad.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
        // Find closest ground sample for this airport
        let closestIdx = 0;
        let closestDelta = Infinity;
        for (let i = 0; i < dist.length; i++) {
          const d = Math.abs(dist[i] - ap.dist);
          if (d < closestDelta) { closestDelta = d; closestIdx = i; }
        }
        const groundY = y(ground[closestIdx]);
        // Draw small runway triangle at ground level
        ctx.fillStyle = '#374151';
        ctx.beginPath();
        ctx.moveTo(px, groundY);
        ctx.lineTo(px - 4, groundY + 6);
        ctx.lineTo(px + 4, groundY + 6);
        ctx.closePath();
        ctx.fill();
        // Airport label above plot
        ctx.fillStyle = '#111827';
        ctx.font = 'bold 10px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(ap.label, px, pad.top - 3);
        // Elevation label — only when zoomed in or few airports
        if (showElevation) {
          ctx.fillStyle = '#6b7280';
          ctx.font = '9px system-ui';
          ctx.fillText(Math.round(ground[closestIdx]).toLocaleString() + ' ft', px, groundY - 5);
        }
      }

      // Restore from plot-area clip
      ctx.restore();

      // ── Cursor line from map click ──
      if (profileCursorDist != null) {
        const cx = x(profileCursorDist);
        if (cx >= pad.left && cx <= W - pad.right) {
          ctx.save();
          ctx.strokeStyle = '#e11d48';
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 3]);
          ctx.beginPath();
          ctx.moveTo(cx, pad.top);
          ctx.lineTo(cx, H - pad.bottom);
          ctx.stroke();
          ctx.setLineDash([]);
          // Distance label
          ctx.fillStyle = '#e11d48';
          ctx.font = 'bold 10px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText(profileCursorDist.toFixed(1) + ' NM', cx, pad.top - 4);
          ctx.restore();
        }
      }
    }

    function addPath(path, color) {
      const poly = L.polyline(path, {color, weight: 4, opacity: 0.85});
      poly.addTo(layerGroup);

      // Click on route line → center profile to that point
      poly.on('click', (e) => {
        L.DomEvent.stopPropagation(e);
        if (!lastProfilePath || !lastProfileArgs) return;
        const clickLat = e.latlng.lat, clickLon = e.latlng.lng;
        const rp = lastProfilePath;
        // Build cumulative distances
        const cumDist = [0];
        for (let i = 1; i < rp.length; i++) {
          cumDist.push(cumDist[i-1] + haversineNm(rp[i-1][0], rp[i-1][1], rp[i][0], rp[i][1]));
        }
        // Project click onto nearest segment
        let bestDist = Infinity, bestProj = 0;
        for (let i = 0; i < rp.length - 1; i++) {
          const ax = rp[i][1], ay = rp[i][0];
          const bx = rp[i+1][1], by = rp[i+1][0];
          const dx = bx - ax, dy = by - ay;
          const segLen2 = dx*dx + dy*dy;
          let t = segLen2 > 0 ? ((clickLon - ax)*dx + (clickLat - ay)*dy) / segLen2 : 0;
          t = Math.max(0, Math.min(1, t));
          const projLat = ay + t * dy, projLon = ax + t * dx;
          const d = haversineNm(clickLat, clickLon, projLat, projLon);
          if (d < bestDist) {
            bestDist = d;
            bestProj = cumDist[i] + t * (cumDist[i+1] - cumDist[i]);
          }
        }
        const totalDist = cumDist[cumDist.length - 1] || 1;
        // Set cursor and pan profile to center on that distance
        profileCursorDist = bestProj;
        // Ensure zoom is at least 2x so centering is useful
        if (profileState.zoom < 2) profileState.zoom = 2;
        const canvas = document.getElementById('profileCanvas');
        const rect = canvas.getBoundingClientRect();
        const pw = rect.width - 55 - 20; // pad.left=55, pad.right=20
        // Center: we want x(bestProj) = pad.left + pw/2
        // x(d) = pad.left + (d/maxDist)*pw*zoom + panX
        // So panX = pw/2 - (bestProj/totalDist)*pw*zoom
        profileState.panX = pw / 2 - (bestProj / totalDist) * pw * profileState.zoom;
        const maxPan = (profileState.zoom - 1) * rect.width;
        profileState.panX = Math.min(0, Math.max(-maxPan, profileState.panX));
        if (lastProfileArgs) drawProfile(...lastProfileArgs);
        // Scroll profile into view
        document.getElementById('profileWrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });

      return poly;
    }

    function addMarker(lat, lon, label, isEndpoint = false) {
      const marker = L.marker([lat, lon]).bindPopup(apLabel(label)).addTo(layerGroup);
      marker.bindTooltip(label, {
        permanent: true, direction: 'top', offset: [0, -36],
        className: 'route-icao-label',
      });
      routeMarkers.push({ marker, label, isEndpoint });
      const z = map.getZoom();
      if (isEndpoint || z >= 9) marker.openTooltip(); else marker.closeTooltip();
      return marker;
    }

    function fmt(n, digits=2) {
      if (n === null || n === undefined) return '';
      return Number(n).toFixed(digits);
    }

    function haversineNm(lat1, lon1, lat2, lon2) {
      const R = 3440.065;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function renderNavLog({legs, usableFuelGal, reserveMin, burnGph, depLabel, arrLabel, stops, failedLeg}) {
      const reserveGal = (reserveMin / 60) * burnGph;
      const resultsDiv = document.getElementById('results');
      const route = apLabel(depLabel) + (stops && stops.length ? ' → ' + stops.map(s => apLabel(s)).join(' → ') : '') + ' → ' + apLabel(arrLabel);

      // Great circle distance between dep and arr
      const depAp = airportLookup[depLabel], arrAp = airportLookup[arrLabel];
      let gcInfo = '';
      if (depAp && arrAp && legs.length) {
        const gcNm = haversineNm(depAp.lat, depAp.lon, arrAp.lat, arrAp.lon);
        const routeNm = legs.reduce((s, l) => s + l.distNm, 0);
        const pctOver = ((routeNm / gcNm - 1) * 100);
        gcInfo = ` &nbsp;|&nbsp; GC ${fmt(gcNm,1)} NM` + (pctOver > 0.5 ? ` &nbsp;(+${fmt(pctOver,1)}%)` : '');
      }

      let html = `<div style="font-weight:600; margin-top:10px">Navigation Log</div>`;
      html += `<div style="margin:4px 0; font-size:0.9em">${route}${gcInfo}</div>`;
      html += '<table style="font-size:0.85em; border-collapse:collapse; width:100%">';
      html += '<thead><tr style="border-bottom:2px solid #888">';
      html += '<th style="text-align:left;padding:2px 6px">#</th>';
      html += '<th style="text-align:left;padding:2px 6px">From</th>';
      html += '<th style="text-align:left;padding:2px 6px">To</th>';
      html += '<th style="text-align:right;padding:2px 6px">Dist<br>NM</th>';
      html += '<th style="text-align:right;padding:2px 6px">Time</th>';
      html += '<th style="text-align:right;padding:2px 6px">Fuel<br>Burn</th>';
      html += '<th style="text-align:right;padding:2px 6px">Fuel<br>Rem</th>';
      html += '<th style="text-align:right;padding:2px 6px;border-left:2px solid #888">Trip<br>Dist</th>';
      html += '<th style="text-align:right;padding:2px 6px">Trip<br>Time</th>';
      html += '<th style="text-align:right;padding:2px 6px">Trip<br>Fuel</th>';
      html += '</tr></thead><tbody>';

      let tripDist = 0, tripTime = 0, tripFuel = 0;
      legs.forEach((leg, i) => {
        tripDist += leg.distNm;
        tripTime += leg.timeHr;
        tripFuel += leg.fuelGal;
        const fuelRem = usableFuelGal - leg.fuelGal;
        const legMin = Math.round(leg.timeHr * 60);
        const tripMin = Math.round(tripTime * 60);

        html += '<tr style="border-bottom:1px solid #ddd">';
        html += `<td style="padding:2px 6px">${i + 1}${leg.cached ? ' \u26A1' : ''}</td>`;
        html += `<td style="padding:2px 6px">${apLabel(leg.from)}</td>`;
        html += `<td style="padding:2px 6px">${apLabel(leg.to)}</td>`;
        html += `<td style="text-align:right;padding:2px 6px">${fmt(leg.distNm, 1)}</td>`;
        html += `<td style="text-align:right;padding:2px 6px">${legMin} min</td>`;
        html += `<td style="text-align:right;padding:2px 6px">${fmt(leg.fuelGal, 1)} gal</td>`;
        html += `<td style="text-align:right;padding:2px 6px;color:${fuelRem < reserveGal ? '#dc2626' : '#16a34a'}">${fmt(fuelRem, 1)} gal</td>`;
        html += `<td style="text-align:right;padding:2px 6px;border-left:2px solid #888">${fmt(tripDist, 1)}</td>`;
        html += `<td style="text-align:right;padding:2px 6px">${tripMin} min</td>`;
        html += `<td style="text-align:right;padding:2px 6px">${fmt(tripFuel, 1)} gal</td>`;
        html += '</tr>';
      });

      // failed leg row (if route aborted mid-way)
      if (failedLeg) {
        html += '<tr style="border-bottom:1px solid #ddd; background:#fef2f2; color:#dc2626">';
        html += `<td style="padding:2px 6px">${legs.length + 1} \u2716</td>`;
        html += `<td style="padding:2px 6px">${failedLeg.from ? apLabel(failedLeg.from) : '?'}</td>`;
        html += `<td style="padding:2px 6px">${failedLeg.to ? apLabel(failedLeg.to) : '?'}</td>`;
        html += '<td colspan="4" style="padding:2px 6px">NO PATH FOUND</td>';
        html += '<td colspan="3" style="border-left:2px solid #888"></td>';
        html += '</tr>';
      }

      // totals row
      const lastFuelRem = legs.length ? usableFuelGal - legs[legs.length - 1].fuelGal : usableFuelGal;
      html += '<tr style="border-top:2px solid #888; font-weight:600">';
      html += `<td colspan="3" style="padding:2px 6px">Total</td>`;
      html += `<td style="text-align:right;padding:2px 6px">${fmt(tripDist, 1)}</td>`;
      html += `<td style="text-align:right;padding:2px 6px">${Math.round(tripTime * 60)} min</td>`;
      html += `<td style="text-align:right;padding:2px 6px">${fmt(tripFuel, 1)} gal</td>`;
      html += `<td style="text-align:right;padding:2px 6px;color:${lastFuelRem < reserveGal ? '#dc2626' : '#16a34a'}">${fmt(lastFuelRem, 1)} gal</td>`;
      html += '<td colspan="3" style="border-left:2px solid #888"></td>';
      html += '</tr>';

      // reserve row
      html += '<tr style="font-size:0.9em; color:#666">';
      html += `<td colspan="5" style="padding:2px 6px">Reserve (${fmt(reserveMin, 0)} min)</td>`;
      html += `<td colspan="2" style="text-align:right;padding:2px 6px">${fmt(reserveGal, 1)} gal</td>`;
      html += '<td colspan="3" style="border-left:2px solid #888"></td>';
      html += '</tr>';

      html += '</tbody></table>';
      resultsDiv.innerHTML = html;
    }

    function abortPlanning() {
