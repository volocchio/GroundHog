    async function planStreaming(payload) {
      abortController = new AbortController();
      setPlanning(true);
      document.getElementById('status').textContent = 'Planning route (checking fuel)...';
      clearMap();

      let exploredCount = 0;
      const legColors = ['#2563eb', '#16a34a', '#dc2626', '#9333ea', '#ea580c'];
      let totalDistNm = 0, totalTimeHr = 0, totalFuelGal = 0;
      let lastLegFuelGal = 0;
      let allCoords = [];
      let legsList = [];
      let legLayers = [];  // per-leg [polyline, marker1, marker2] for selective removal
      let stops = [];
      let currentLeg = 0;
      let numLegs = 1;
      let overallBounds = null;

      try {
        const res = await fetch('/route/stream', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify(payload),
          signal: abortController.signal,
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => null);
          throw new Error(errData?.detail || `HTTP ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, {stream: true});

          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const event = JSON.parse(line.slice(6));

            if (event.type === 'adsb_warning') {
              const names = event.airports.map(a => `${a.icao} (Class ${a.airspace_class} — ${a.airspace_name})`);
              const warnDiv = document.getElementById('error');
              warnDiv.innerHTML = `<span style="color:#b45309">⚠️ ADS-B Out not equipped — the following airports are inside ADS-B required airspace:<br>${names.join('<br>')}</span>`;
            }

            if (event.type === 'reroute') {
              // Terrain blocked a leg — server is replanning this segment
              const keep = event.keep_legs || 0;
              exploreGroup.clearLayers();
              // Remove only the current segment's map layers
              for (let k = keep; k < legLayers.length; k++) {
                for (const lyr of legLayers[k]) layerGroup.removeLayer(lyr);
              }
              legLayers = legLayers.slice(0, keep);
              // Rollback stats to the kept legs
              legsList = legsList.slice(0, keep);
              allCoords = [];
              totalDistNm = 0; totalTimeHr = 0; totalFuelGal = 0;
              for (const leg of legsList) {
                totalDistNm += leg.distNm;
                totalTimeHr += leg.timeHr;
                totalFuelGal += leg.fuelGal;
                allCoords = allCoords.concat(leg._coords || []);
              }
              exploredCount = 0;
              currentLeg = keep;
              document.getElementById('status').textContent = event.message || 'Replanning segment\u2026';
            }

            if (event.type === 'route_plan') {
              stops = event.stops || [];
              numLegs = event.num_legs || 1;
              document.getElementById('status').textContent =
                numLegs > 1
                  ? `Route requires ${numLegs} legs (${stops.length} fuel stop${stops.length !== 1 ? 's' : ''}). Streaming leg 1...`
                  : 'Downloading elevation tiles & searching...';
            }

            if (event.type === 'leg_start') {
              currentLeg = event.leg_index || 0;
              if (numLegs > 1) {
                document.getElementById('status').textContent =
                  `Streaming leg ${currentLeg + 1} of ${numLegs}: ${event.from} → ${event.to}...`;
              }
            }

            if (event.type === 'grid') {
              const b = event.bounds;
              const legBounds = L.latLngBounds([[b[0], b[1]], [b[2], b[3]]]);
              overallBounds = overallBounds ? overallBounds.extend(legBounds) : legBounds;
              map.fitBounds(legBounds, {padding: [30, 30]});
            }

            if (event.type === 'explore') {
              exploredCount += event.cells.length;
              document.getElementById('status').textContent =
                numLegs > 1
                  ? `Leg ${currentLeg + 1}/${numLegs} — ${exploredCount.toLocaleString()} cells explored`
                  : `Searching... ${exploredCount.toLocaleString()} cells explored`;
              for (const [lat, lon] of event.cells) {
                L.circleMarker([lat, lon], {
                  radius: 1, color: '#f59e0b', fillColor: '#f59e0b',
                  fillOpacity: 0.15, weight: 0, opacity: 0.15
                }).addTo(exploreGroup);
              }
            }

            if (event.type === 'path') {
              exploreGroup.clearLayers();

              const color = legColors[currentLeg % legColors.length];
              const poly = addPath(event.coords, color);

              // Track per-leg map layers for selective removal on reroute
              const m1 = event.coords.length ? addMarker(event.coords[0][0], event.coords[0][1], event.from || payload.dep_icao, currentLeg === 0) : null;
              const m2 = event.coords.length ? addMarker(
                event.coords[event.coords.length-1][0],
                event.coords[event.coords.length-1][1],
                event.to || payload.arr_icao,
                currentLeg === numLegs - 1
              ) : null;
              legLayers.push([poly, m1, m2].filter(Boolean));

              // accumulate
              totalDistNm += event.dist_nm;
              const legTimeHr = event.dist_nm / payload.cruise_speed_kt;
              const legFuelGal = legTimeHr * payload.fuel_burn_gph;
              totalTimeHr += legTimeHr;
              totalFuelGal += legFuelGal;
              lastLegFuelGal = legFuelGal;
              allCoords = allCoords.concat(event.coords);
              legsList.push({
                from: event.from || payload.dep_icao,
                to: event.to || payload.arr_icao,
                distNm: event.dist_nm,
                timeHr: legTimeHr,
                fuelGal: legFuelGal,
                cached: !!event.cached,
                _coords: event.coords,  // stash for reroute recovery
              });

              // fit to overall bounds
              if (overallBounds) {
                overallBounds.extend(poly.getBounds());
                map.fitBounds(overallBounds.pad(0.15));
              } else {
                map.fitBounds(poly.getBounds().pad(0.15));
              }
            }

            if (event.type === 'no_path') {
              // render partial nav log with completed legs + failed leg
              if (legsList.length > 0) {
                renderNavLog({
                  legs: legsList,
                  usableFuelGal: payload.usable_fuel_gal,
                  reserveMin: payload.reserve_min,
                  burnGph: payload.fuel_burn_gph,
                  depLabel: payload.dep_icao,
                  arrLabel: payload.arr_icao,
                  stops,
                  failedLeg: { from: event.from, to: event.to },
                });
                if (allCoords.length >= 2) {
                  fetchAndDrawProfile(allCoords, payload.max_msl_ft, payload.min_agl_ft, payload.dep_icao, payload.arr_icao,
                    payload.cruise_speed_kt, payload.max_climb_fpm, payload.max_descent_fpm,
                    payload.climb_speed_kt, payload.descent_speed_kt, payload.terrain_follow, payload.avoid_airspace, legsList);
                }
              }
              document.getElementById('status').textContent = '';
              document.getElementById('error').textContent =
                event.message || 'No terrain-avoiding path found.';
            }

            if (event.type === 'done') {
              if (legsList.length > 0) {
                renderNavLog({
                  legs: legsList,
                  usableFuelGal: payload.usable_fuel_gal,
                  reserveMin: payload.reserve_min,
                  burnGph: payload.fuel_burn_gph,
                  depLabel: payload.dep_icao,
                  arrLabel: payload.arr_icao,
                  stops,
                });

                const cachedCount = legsList.filter(l => l.cached).length;
                let statusMsg = `Route found! ${fmt(totalDistNm, 1)} NM`;
                if (cachedCount === legsList.length) {
                  statusMsg += ' (all legs from cache \u26A1)';
                } else if (cachedCount > 0) {
                  statusMsg += ` (${cachedCount}/${legsList.length} legs cached \u26A1, ${exploredCount.toLocaleString()} cells explored)`;
                } else {
                  statusMsg += `, ${exploredCount.toLocaleString()} cells explored`;
                }
                if (stops.length) statusMsg += ` | ${stops.length} fuel stop${stops.length !== 1 ? 's' : ''}`;
                document.getElementById('status').textContent = statusMsg;

                fetchAndDrawProfile(allCoords, payload.max_msl_ft, payload.min_agl_ft, payload.dep_icao, payload.arr_icao,
                  payload.cruise_speed_kt, payload.max_climb_fpm, payload.max_descent_fpm,
                  payload.climb_speed_kt, payload.descent_speed_kt, payload.terrain_follow, payload.avoid_airspace, legsList);
              } else {
                if (!document.getElementById('error').textContent)
                  document.getElementById('status').textContent = 'Done.';
              }
            }
          }
        }
      } catch (e) {
        if (e.name === 'AbortError') return;
        document.getElementById('status').textContent = '';
        const msg = (e instanceof TypeError && /network|fetch|failed/i.test(e.message))
          ? 'Cannot reach server \u2014 is it running?'
          : String(e);
        document.getElementById('error').textContent = msg;
      } finally {
        abortController = null;
        setPlanning(false);
        refreshCacheStats();
      }
    }

    async function planNormal(payload) {
      setPlanning(true);
      abortController = new AbortController();
      document.getElementById('status').textContent = 'Planning... (first run may download SRTM tiles)';
      clearMap();

      try {
        const res = await fetch('/route', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify(payload),
          signal: abortController.signal,
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error((data && data.detail) ? data.detail : ('HTTP ' + res.status));
        }

        if (data.type === 'no_route') {
          document.getElementById('status').textContent = '';
          document.getElementById('error').textContent = data.message + "\n\nSuggestions:\n- " + (data.suggestions || []).join('\n- ');
          return;
        }

        // render nav log
        const navLegs = data.legs.map(l => ({
          from: l.from, to: l.to, distNm: l.dist_nm, timeHr: l.time_hr, fuelGal: l.fuel_gal
        }));

        renderNavLog({
          legs: navLegs,
          usableFuelGal: payload.usable_fuel_gal,
          reserveMin: payload.reserve_min,
          burnGph: payload.fuel_burn_gph,
          depLabel: payload.dep_icao,
          arrLabel: payload.arr_icao,
          stops: data.stops || [],
        });

        document.getElementById('status').textContent = '';

        // map
        const colors = ['#2563eb', '#16a34a'];
        let bounds = null;
        data.legs.forEach((leg, idx) => {
          const path = (leg.path || []).map(p => [p[0], p[1]]);
          if (path.length) {
            const poly = addPath(path, colors[idx % colors.length]);
            if (!bounds) bounds = poly.getBounds(); else bounds.extend(poly.getBounds());
          }
        });

        if (data.legs && data.legs.length) {
          const added = new Set();
          data.legs.forEach((leg, idx) => {
            const path = (leg.path || []).map(p => [p[0], p[1]]);
            const fromLabel = leg.from || (idx === 0 ? payload.dep_icao : (data.stops || [])[idx - 1]);
            const toLabel = leg.to || (idx === data.legs.length - 1 ? payload.arr_icao : (data.stops || [])[idx]);
            if (path.length && fromLabel && !added.has(fromLabel)) {
              addMarker(path[0][0], path[0][1], fromLabel, idx === 0);
              added.add(fromLabel);
            }
            if (path.length && toLabel && !added.has(toLabel)) {
              addMarker(path[path.length - 1][0], path[path.length - 1][1], toLabel, idx === data.legs.length - 1);
              added.add(toLabel);
            }
          });
        }

        if (bounds) map.fitBounds(bounds.pad(0.15));

        // Fetch and draw elevation profile for all legs combined
        const allCoords = data.legs.flatMap(l => l.path || []);
        if (allCoords.length >= 2) {
          fetchAndDrawProfile(allCoords, payload.max_msl_ft, payload.min_agl_ft, payload.dep_icao, payload.arr_icao,
            payload.cruise_speed_kt, payload.max_climb_fpm, payload.max_descent_fpm,
            payload.climb_speed_kt, payload.descent_speed_kt, payload.terrain_follow, payload.avoid_airspace, navLegs);
        }

      } catch (e) {
        if (e.name === 'AbortError') return;
        document.getElementById('status').textContent = '';
        const msg = (e instanceof TypeError && /network|fetch|failed/i.test(e.message))
          ? 'Cannot reach server \u2014 is it running?'
          : String(e);
        document.getElementById('error').textContent = msg;
      } finally {
        abortController = null;
        setPlanning(false);
        refreshCacheStats();
      }
    }

    async function plan() {
      document.getElementById('error').textContent = '';
      document.getElementById('results').innerHTML = '';
      const payload = getPayload();

      // Pre-flight check: airport elevation vs max MSL ceiling
      const depAp = airportLookup[payload.dep_icao];
      const arrAp = airportLookup[payload.arr_icao];
      if (depAp && depAp.elev > payload.max_msl_ft) {
        document.getElementById('error').textContent =
          `${payload.dep_icao} elevation (${Math.round(depAp.elev)}' MSL) is above your max altitude ceiling (${payload.max_msl_ft}' MSL). Increase Max MSL or pick a different airport.`;
        return;
      }
      if (arrAp && arrAp.elev > payload.max_msl_ft) {
        document.getElementById('error').textContent =
          `${payload.arr_icao} elevation (${Math.round(arrAp.elev)}' MSL) is above your max altitude ceiling (${payload.max_msl_ft}' MSL). Increase Max MSL or pick a different airport.`;
        return;
      }

      // Check waypoint elevations too (strip -NF suffix for lookup)
      for (const wpRaw of payload.waypoints) {
        const wpCode = wpRaw.replace(/-NF$/i, '');
        const wpAp = airportLookup[wpCode];
        if (wpAp && wpAp.elev > payload.max_msl_ft) {
          document.getElementById('error').textContent =
            `Waypoint ${wpCode} elevation (${Math.round(wpAp.elev)}' MSL) is above your max altitude ceiling (${payload.max_msl_ft}' MSL). Increase Max MSL or remove this waypoint.`;
          return;
        }
      }

      // Scroll so the map is visible
      document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'start' });

      const watch = document.getElementById('watchSearch').checked;
      if (watch) {
        await planStreaming(payload);
      } else {
        await planNormal(payload);
      }
    }

    document.getElementById('goBtn').addEventListener('click', plan);

    // cache stats
    async function refreshCacheStats() {
      try {
        const r = await fetch('/cache/stats');
        if (!r.ok) return;
        const s = await r.json();
        document.getElementById('cacheStats').innerHTML =
          `Route cache: ${s.cached_legs} legs cached, ${s.total_hits} hits | ${s.routes_logged} routes logged`;
      } catch {}
    }
    refreshCacheStats();

    // ── Save / Load routes (localStorage) ──
    const STORAGE_KEY = 'groundhog_saved_routes';

    function getSavedRoutes() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function refreshSavedDropdown() {
      const sel = document.getElementById('savedRoutes');
      const routes = getSavedRoutes();
      sel.innerHTML = '<option value="">\u2014 none \u2014</option>';
      for (const name of Object.keys(routes).sort()) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      }
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      const payload = getPayload();
      const wpDisplay = payload.waypoints.map(w => {
        const nf = w.endsWith('-NF');
        const code = nf ? w.slice(0, -3) : w;
        return nf ? code : code + ' \u26FD';
      });
      const defaultName = payload.dep_icao +
        (wpDisplay.length ? ' \u2192 ' + wpDisplay.join(' \u2192 ') : '') +
        ' \u2192 ' + payload.arr_icao +
        ' (' + payload.max_msl_ft.toLocaleString() + 'ft MSL)';
      const name = prompt('Route name:', defaultName);
      if (!name) return;
      const routes = getSavedRoutes();
      routes[name] = {
        dep: payload.dep_icao,
        arr: payload.arr_icao,
        waypoints: document.getElementById('waypoints').value,
        cruise_speed_kt: payload.cruise_speed_kt,
        usable_fuel_gal: payload.usable_fuel_gal,
        fuel_burn_gph: payload.fuel_burn_gph,
        reserve_min: payload.reserve_min,
        max_msl_ft: payload.max_msl_ft,
        min_agl_ft: payload.min_agl_ft,
        required_fuel: payload.required_fuel,
        max_detour_factor: payload.max_detour_factor,
        max_climb_fpm: payload.max_climb_fpm,
        max_descent_fpm: payload.max_descent_fpm,
        climb_speed_kt: payload.climb_speed_kt,
        descent_speed_kt: payload.descent_speed_kt,
        terrain_follow: payload.terrain_follow,
        obstacle_radius_nm: payload.obstacle_radius_nm,
        obstacle_clearance_ft: payload.obstacle_clearance_ft,
        adsb_out: payload.adsb_out,
        avoid_airspace: payload.avoid_airspace,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(routes));
      refreshSavedDropdown();
      document.getElementById('savedRoutes').value = name;
    });

    document.getElementById('deleteBtn').addEventListener('click', () => {
      const sel = document.getElementById('savedRoutes');
      const name = sel.value;
      if (!name) return;
      if (!confirm(`Delete saved route "${name}"?`)) return;
      const routes = getSavedRoutes();
      delete routes[name];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(routes));
      refreshSavedDropdown();
    });

    document.getElementById('savedRoutes').addEventListener('change', (e) => {
      const name = e.target.value;
      if (!name) return;
      const routes = getSavedRoutes();
      const r = routes[name];
      if (!r) return;
      document.getElementById('dep').value = r.dep || '';
      document.getElementById('arr').value = r.arr || '';
      document.getElementById('waypoints').value = r.waypoints || '';
      document.getElementById('speedKt').value = r.cruise_speed_kt || 75;
      document.getElementById('usableFuel').value = r.usable_fuel_gal || 48;
      document.getElementById('burnGph').value = r.fuel_burn_gph || 13;
      document.getElementById('reserveMin').value = r.reserve_min || 30;
      document.getElementById('maxMsl').value = r.max_msl_ft || 7000;
      document.getElementById('minAgl').value = r.min_agl_ft || 200;
      document.getElementById('fuelType').value = r.required_fuel || '100LL';
      document.getElementById('detour').value = r.max_detour_factor || 1.8;
      detourVal.textContent = r.max_detour_factor || 1.8;
      document.getElementById('maxClimb').value = r.max_climb_fpm || 0;
      document.getElementById('maxDescent').value = r.max_descent_fpm || 0;
      document.getElementById('climbSpeedKt').value = r.climb_speed_kt || 0;
      document.getElementById('descentSpeedKt').value = r.descent_speed_kt || 0;
      // Set flight mode radio
      const modeVal = r.terrain_follow ? 'terrain' : 'maxmsl';
      document.querySelector(`input[name="flightMode"][value="${modeVal}"]`).checked = true;
      document.querySelector('input[name="flightMode"]').dispatchEvent(new Event('change'));
      // Obstacle avoidance
      document.getElementById('obsRadius').value = r.obstacle_radius_nm != null ? r.obstacle_radius_nm : 0.5;
      document.getElementById('obsClearance').value = r.obstacle_clearance_ft != null ? r.obstacle_clearance_ft : 500;
      // ADS-B Out + airspace avoidance
      document.getElementById('adsbOut').checked = r.adsb_out !== false;
      document.getElementById('adsbOut').dispatchEvent(new Event('change'));
      if (r.avoid_airspace) {
        document.querySelectorAll('#avoidChecks input[type="checkbox"]:not(:disabled)').forEach(cb => {
          cb.checked = r.avoid_airspace.includes(cb.value);
        });
      }
      // Auto-run the route so map and profile populate immediately
      plan();
    });

    refreshSavedDropdown();
  </script>
</body>
</html>
